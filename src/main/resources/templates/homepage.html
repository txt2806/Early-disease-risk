        timeSlot: ''
      });

      const [status, setStatus] = useState({ type: '', message: '' });
      const [loading, setLoading] = useState(false);

      const handleInputChange = (e) => {
        const { name, value } = e.target;
        setFormData(prev => ({ ...prev, [name]: value }));
      };

      const handleSubmit = async (e) => {
        e.preventDefault();
        setLoading(true);
        setStatus({ type: '', message: '' });

        if (!formData.fullName.trim()) {
          setStatus({ type: 'error', message: 'Vui lòng nhập họ và tên.' });
          setLoading(false);
          return;
        }
        if (!formData.phone.match(/^[0-9]{10,11}$/)) {
          setStatus({ type: 'error', message: 'Số điện thoại không hợp lệ (yêu cầu 10-11 số).' });
          setLoading(false);
          return;
        }

        try {
          // Giả lập gửi API tới server Spring Boot
          await new Promise(resolve => setTimeout(resolve, 1200));
          setStatus({
            type: 'success',
            message: '🎉 Đăng ký đặt lịch khám thành công! Bộ phận lễ tân sẽ liên hệ xác nhận qua điện thoại trong vài phút.'
          });
          setFormData({ fullName: '', phone: '', specialty: '', doctor: '', date: '', timeSlot: '' });
        } catch (err) {
          setStatus({ type: 'error', message: 'Có lỗi xảy ra. Vui lòng liên hệ hotline cấp cứu.' });
        } finally {
          setLoading(false);
        }
      };

      return (
        <section id="booking" className="py-20 bg-white relative overflow-hidden">
          <div className="absolute top-1/2 left-0 -translate-y-1/2 w-[300px] h-[300px] bg-rose-50 rounded-full blur-[100px] pointer-events-none" />
          <div className="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 relative z-10">
            <div className="bg-slate-900 text-white rounded-3xl overflow-hidden border border-white/10 shadow-2xl p-8 sm:p-12">
              <div className="text-center max-w-2xl mx-auto mb-10">
                <div className="inline-flex items-center justify-center p-3 bg-white/10 rounded-2xl mb-4">
                  <i data-lucide="clipboard-check" className="h-6 w-6 text-medical-coral"></i>
                </div>
                <h2 className="text-2xl sm:text-3xl font-extrabold tracking-tight mb-2">Đặt lịch hẹn khám nhanh</h2>
                <p className="text-slate-400 text-xs sm:text-sm font-semibold">Nhập thông tin đăng ký khám bệnh. Chúng tôi bảo mật thông tin y khoa của bạn tuyệt đối.</p>
              </div>
              {status.message && (
                <div className={`mb-6 p-4 rounded-xl text-sm font-bold border ${
                  status.type === 'success' ? 'bg-green-500/10 border-green-500/20 text-green-400' : 'bg-rose-500/10 border-rose-500/20 text-rose-400'
                }`}>{status.message}</div>
              )}
              <form onSubmit={handleSubmit} className="space-y-6 text-left">
                <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                  <div className="flex flex-col gap-2">
                    <label className="text-xs font-bold text-slate-400 uppercase tracking-wider">Họ và tên bệnh nhân *</label>
                    <div className="relative">
                      <i data-lucide="user" className="absolute left-4 top-1/2 -translate-y-1/2 h-5 w-5 text-slate-500"></i>
                      <input type="text" name="fullName" required value={formData.fullName} onChange={handleInputChange} placeholder="Nguyễn Văn A" className="w-full bg-white/5 border border-white/10 rounded-2xl py-3.5 pl-12 pr-4 text-white placeholder-slate-500 focus:outline-none focus:border-medical-coral focus:ring-1 focus:ring-medical-coral text-sm font-semibold" />
                    </div>
                  </div>
                  <div className="flex flex-col gap-2">
                    <label className="text-xs font-bold text-slate-400 uppercase tracking-wider">Số điện thoại liên hệ *</label>
                    <div className="relative">
                      <i data-lucide="phone" className="absolute left-4 top-1/2 -translate-y-1/2 h-5 w-5 text-slate-500"></i>
                      <input type="tel" name="phone" required value={formData.phone} onChange={handleInputChange} placeholder="Ví dụ: 0912345678" className="w-full bg-white/5 border border-white/10 rounded-2xl py-3.5 pl-12 pr-4 text-white placeholder-slate-500 focus:outline-none focus:border-medical-coral focus:ring-1 focus:ring-medical-coral text-sm font-semibold" />
                    </div>
                  </div>
                  <div className="flex flex-col gap-2">
                    <label className="text-xs font-bold text-slate-400 uppercase tracking-wider">Chuyên khoa cần khám *</label>
                    <div className="relative">
                      <i data-lucide="heart" className="absolute left-4 top-1/2 -translate-y-1/2 h-5 w-5 text-slate-500"></i>
                      <select name="specialty" required value={formData.specialty} onChange={handleInputChange} className="w-full bg-slate-900 border border-white/10 rounded-2xl py-3.5 pl-12 pr-4 text-white focus:outline-none focus:border-medical-coral focus:ring-1 focus:ring-medical-coral text-sm font-semibold cursor-pointer">
                        <option value="">-- Chọn chuyên khoa --</option>
                        <option value="Khám tim mạch tổng quát">Khám tim mạch tổng quát</option>
                        <option value="Đo điện tâm đồ (ECG)">Đo điện tâm đồ (ECG)</option>
                        <option value="Siêu âm tim Doppler">Siêu âm tim Doppler</option>
                        <option value="Điều trị cao huyết áp">Điều trị cao huyết áp</option>
                      </select>
                    </div>
                  </div>
                  <div className="flex flex-col gap-2">
                    <label className="text-xs font-bold text-slate-400 uppercase tracking-wider">Bác sĩ mong muốn (nếu có)</label>
                    <div className="relative">
                      <i data-lucide="stethoscope" className="absolute left-4 top-1/2 -translate-y-1/2 h-5 w-5 text-slate-500"></i>
                      <select name="doctor" value={formData.doctor} onChange={handleInputChange} className="w-full bg-slate-900 border border-white/10 rounded-2xl py-3.5 pl-12 pr-4 text-white focus:outline-none focus:border-medical-coral focus:ring-1 focus:ring-medical-coral text-sm font-semibold cursor-pointer">
                        <option value="">-- Chọn bác sĩ --</option>
                        <option value="PGS.TS.BS. Nguyễn Văn An">PGS.TS.BS. Nguyễn Văn An</option>
                        <option value="ThS.BS. Trần Thị Bình">ThS.BS. Trần Thị Bình</option>
                        <option value="TS.BS. Lê Hoàng Đức">TS.BS. Lê Hoàng Đức</option>
                      </select>
                    </div>
                  </div>
                  <div className="flex flex-col gap-2">
                    <label className="text-xs font-bold text-slate-400 uppercase tracking-wider">Ngày hẹn khám *</label>
                    <div className="relative">
                      <i data-lucide="calendar" className="absolute left-4 top-1/2 -translate-y-1/2 h-5 w-5 text-slate-500"></i>
                      <input type="date" name="date" required value={formData.date} onChange={handleInputChange} className="w-full bg-white/5 border border-white/10 rounded-2xl py-3.5 pl-12 pr-4 text-white focus:outline-none focus:border-medical-coral focus:ring-1 focus:ring-medical-coral text-sm font-semibold cursor-pointer" />
                    </div>
                  </div>
                  <div className="flex flex-col gap-2">
                    <label className="text-xs font-bold text-slate-400 uppercase tracking-wider">Giờ hẹn khám *</label>
                    <div className="relative">
                      <i data-lucide="clock" className="absolute left-4 top-1/2 -translate-y-1/2 h-5 w-5 text-slate-500"></i>
                      <select name="timeSlot" required value={formData.timeSlot} onChange={handleInputChange} className="w-full bg-slate-900 border border-white/10 rounded-2xl py-3.5 pl-12 pr-4 text-white focus:outline-none focus:border-medical-coral focus:ring-1 focus:ring-medical-coral text-sm font-semibold cursor-pointer">
                        <option value="">-- Chọn khung giờ --</option>
                        <option value="08:00 - 09:00">08:00 - 09:00</option>
                        <option value="09:00 - 10:00">09:00 - 10:00</option>
                        <option value="10:00 - 11:00">10:00 - 11:00</option>
                        <option value="14:00 - 15:00">14:00 - 15:00</option>
                        <option value="15:00 - 16:00">15:00 - 16:00</option>
                      </select>
                    </div>
                  </div>
                </div>
                <div className="pt-4 flex justify-center">
                  <button type="submit" disabled={loading} className="w-full sm:w-auto bg-medical-coral hover:bg-medical-coralhover text-white px-10 py-4 rounded-full text-base font-bold shadow-lg transition-all hover:-translate-y-0.5 disabled:opacity-50">
                    {loading ? 'Đang gửi thông tin...' : 'Xác nhận Đặt lịch hẹn'}
                  </button>
                </div>
              </form>
            </div>
          </div>
        </section>
      );
    }

    // ========================================================
    // 7. FOOTER COMPONENT
    // ========================================================
    function Footer() {
      return (
        <footer className="bg-medical-dark text-slate-400 pt-16 pb-8 border-t border-white/5 relative overflow-hidden">
          <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 relative z-10">
            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-12 gap-10 lg:gap-8 mb-12">
              <div className="lg:col-span-4 flex flex-col items-start text-left">
                <div className="flex items-center gap-2 mb-4 cursor-pointer" onClick={() => window.scrollTo({top: 0, behavior: 'smooth'})}>
                  <i data-lucide="heart-pulse" className="h-8 w-8 text-medical-coral"></i>
                  <span className="text-white font-extrabold text-xl tracking-tight">
                    CARDIO<span className="text-medical-coral">CARE</span>
                  </span>
                </div>
                <p className="text-slate-400 text-sm leading-relaxed mb-6">Hệ thống phòng khám chuyên khoa tim mạch hàng đầu, tích hợp trí tuệ nhân tạo (AI) giúp dự đoán và ngăn ngừa nguy cơ đột quỵ và các bệnh lý tim mạch sớm.</p>
                <div className="flex items-center gap-3 p-3 bg-red-500/10 border border-red-500/20 rounded-2xl">
                  <i data-lucide="shield-alert" className="h-5 w-5 text-red-500 animate-pulse"></i>
                  <span className="text-xs font-bold text-red-400 uppercase tracking-wider font-bold">Cấp cứu 24/7: 1900 1234</span>
                </div>
              </div>
              <div className="lg:col-span-3 text-left">
                <h4 className="text-white font-bold text-sm uppercase tracking-wider mb-6">Dịch vụ chính</h4>
                <ul className="space-y-3.5 text-sm font-semibold">
                  <li><a href="#services" className="hover:text-white transition-colors">Khám tim tổng quát</a></li>
                  <li><a href="#services" className="hover:text-white transition-colors">Đo điện tâm đồ (ECG)</a></li>
                  <li><a href="#services" className="hover:text-white transition-colors">Siêu âm tim Doppler</a></li>
                  <li><a href="#services" className="hover:text-white transition-colors">Dự báo nguy cơ bằng AI</a></li>
                </ul>
              </div>
              <div className="lg:col-span-5 text-left">
                <h4 className="text-white font-bold text-sm uppercase tracking-wider mb-6">Thông tin liên hệ</h4>
                <ul className="space-y-4 text-sm font-semibold">
                  <li className="flex items-start gap-3">
                    <i data-lucide="map-pin" className="h-5 w-5 text-medical-coral flex-shrink-0 mt-0.5"></i>
                    <span className="text-slate-300">Tòa nhà Cardio Care, Khu đô thị công nghệ FPT Đà Nẵng, Ngũ Hành Sơn, Đà Nẵng</span>
                  </li>
                  <li className="flex items-center gap-3">
                    <i data-lucide="phone-call" className="h-5 w-5 text-medical-coral flex-shrink-0"></i>
                    <span className="text-slate-300">Hotline: (0236) 3 999 888</span>
                  </li>
                  <li className="flex items-center gap-3">
                    <i data-lucide="mail" className="h-5 w-5 text-medical-coral flex-shrink-0"></i>
                    <span className="text-slate-300">lienhe@cardiocare.vn</span>
                  </li>
                </ul>
              </div>
            </div>
            <div className="pt-8 border-t border-white/5 flex flex-col sm:flex-row items-center justify-between gap-4 text-xs font-semibold text-slate-500">
              <div>&copy; {new Date().getFullYear()} Cardio Care. Bảo lưu mọi quyền.</div>
              <div className="flex items-center gap-1">
                Made with <i data-lucide="heart" className="h-3.5 w-3.5 text-medical-coral fill-medical-coral"></i> for a healthier heart.
              </div>
            </div>
          </div>
        </footer>
      );
    }

    // ========================================================
    // 8. APP ROOT
    // ========================================================
    function App() {
      // Trigger Lucide icons replacing after mounting
      useEffect(() => {
        if (window.lucide) {
          window.lucide.createIcons();
        }
      });

      return (
        <div className="min-h-screen bg-slate-50 text-slate-900 font-sans antialiased scroll-smooth">
          <Navbar />
          <Hero />
          <Stats />
          <Services />
          <Doctors />
          <BookingForm />
          <Footer />
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
    // Ẩn loading fallback khi React đã render xong
    const fallback = document.getElementById('loading-fallback');
    if (fallback) fallback.style.display = 'none';
    /*]]>*/
  </script>

</body>
</html>
