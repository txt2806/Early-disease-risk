<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đăng ký Bệnh nhân — CardioCare</title>
  
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    /*<![CDATA[*/
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            medical: {
              dark: '#0a0f1e', // Nền tối
              card: '#111827', // Thẻ card tối
              border: 'rgba(255,255,255,0.08)',
              trust: '#2563eb', // Accent blue
              accent: '#3b82f6',
              light: '#e8edf5', // Chữ trắng sáng
              gray: '#8a96b0', // Chữ xám nhạt
              coral: '#f43f5e',
              coralhover: '#e11d48'
            }
          },
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
          }
        }
      }
    }
    /*]]>*/
  </script>

  <!-- Google Fonts: Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  
  <!-- Lucide Icons CDN -->
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-medical-dark text-medical-light antialiased font-sans min-h-screen flex items-center justify-center relative overflow-hidden p-4">

  <!-- Background glow decoration -->
  <div class="absolute -top-40 -right-40 w-96 h-96 bg-blue-500/10 rounded-full blur-[100px] pointer-events-none"></div>
  <div class="absolute -bottom-40 -left-40 w-96 h-96 bg-rose-500/5 rounded-full blur-[100px] pointer-events-none"></div>

  <!-- Form Card (Dark Theme) -->
  <div class="w-full max-w-xl bg-medical-card border border-medical-border rounded-3xl shadow-2xl p-6 sm:p-10 relative z-10 my-8">
    
    <!-- Logo Header -->
    <div class="flex flex-col items-center text-center mb-8">
      <div class="flex items-center gap-2 cursor-pointer mb-2" onclick="window.location.href='/'">
        <i data-lucide="heart-pulse" class="h-9 w-9 text-medical-coral animate-pulse"></i>
        <span class="text-white font-extrabold text-2xl tracking-tight">
          CARDIO<span class="text-medical-coral">CARE</span>
        </span>
      </div>
      <p class="text-medical-gray text-sm font-semibold">Đăng ký Hồ sơ Bệnh nhân mới</p>
    </div>

    <!-- Error/Success Alerts (Thymeleaf) -->
    <div class="mb-5 p-4 rounded-xl text-sm font-bold border bg-rose-500/10 border-rose-500/20 text-rose-400" th:if="${error}" th:text="${error}"></div>
    <div class="mb-5 p-4 rounded-xl text-sm font-bold border bg-green-500/10 border-green-500/20 text-green-400" th:if="${success}" th:text="${success}"></div>
    <div id="statusMessage" class="mb-5"></div>

    <!-- Redirect Countdown Message -->
    <div id="redirectMessage" class="mb-5 p-4 rounded-xl text-sm font-bold border bg-green-500/10 border-green-500/20 text-green-400 text-center hidden"></div>

    <!-- Main Registration Form -->
    <form th:action="@{/register}" method="post" id="registerForm" class="space-y-5 text-left">
      
      <!-- 1. Email and Phone -->
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-5">
        <div class="flex flex-col gap-1.5">
          <label class="text-xs font-bold text-medical-gray uppercase tracking-wider">Email Đăng ký *</label>
          <div class="relative">
            <i data-lucide="mail" class="absolute left-4 top-1/2 -translate-y-1/2 h-5 w-5 text-medical-gray"></i>
            <input 
              type="email" 
              name="emailInput" 
              id="email" 
              placeholder="patient@example.com" 
              required
              class="w-full bg-[#161e2e] border border-medical-border rounded-2xl py-3 pl-11 pr-4 text-white placeholder-slate-600 focus:outline-none focus:border-medical-trust focus:ring-1 focus:ring-medical-trust text-sm font-semibold"
            />
          </div>
        </div>
        <div class="flex flex-col gap-1.5">
          <label class="text-xs font-bold text-medical-gray uppercase tracking-wider">Số điện thoại (+84...) *</label>
          <div class="relative">
            <i data-lucide="phone" class="absolute left-4 top-1/2 -translate-y-1/2 h-5 w-5 text-medical-gray"></i>
            <input 
              type="tel" 
              name="phoneInput" 
              id="phone" 
              placeholder="+84912345678" 
              required
              class="w-full bg-[#161e2e] border border-medical-border rounded-2xl py-3 pl-11 pr-4 text-white placeholder-slate-600 focus:outline-none focus:border-medical-trust focus:ring-1 focus:ring-medical-trust text-sm font-semibold"
            />
          </div>
        </div>
      </div>

      <!-- 2. Password and Full Name -->
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-5">
        <div class="flex flex-col gap-1.5">
          <label class="text-xs font-bold text-medical-gray uppercase tracking-wider">Mật khẩu tự chọn *</label>
          <div class="relative">
            <i data-lucide="lock" class="absolute left-4 top-1/2 -translate-y-1/2 h-5 w-5 text-medical-gray"></i>
            <input 
              type="password" 
              name="password" 
              id="password" 
              placeholder="••••••••" 
              required 
              minlength="6"
              class="w-full bg-[#161e2e] border border-medical-border rounded-2xl py-3 pl-11 pr-4 text-white placeholder-slate-600 focus:outline-none focus:border-medical-trust focus:ring-1 focus:ring-medical-trust text-sm font-semibold"
            />
          </div>
        </div>
        <div class="flex flex-col gap-1.5">
          <label class="text-xs font-bold text-medical-gray uppercase tracking-wider">Họ và Tên đầy đủ *</label>
          <div class="relative">
            <i data-lucide="user" class="absolute left-4 top-1/2 -translate-y-1/2 h-5 w-5 text-medical-gray"></i>
            <input 
              type="text" 
              name="fullName" 
              placeholder="Nguyễn Văn A" 
              required
              class="w-full bg-[#161e2e] border border-medical-border rounded-2xl py-3 pl-11 pr-4 text-white placeholder-slate-600 focus:outline-none focus:border-medical-trust focus:ring-1 focus:ring-medical-trust text-sm font-semibold"
            />
          </div>
        </div>
      </div>

      <!-- 3. Date of Birth and Gender -->
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-5">
        <div class="flex flex-col gap-1.5">
          <label class="text-xs font-bold text-medical-gray uppercase tracking-wider">Ngày sinh *</label>
          <div class="relative">
            <i data-lucide="calendar" class="absolute left-4 top-1/2 -translate-y-1/2 h-5 w-5 text-medical-gray"></i>
            <input 
              type="date" 
              name="dob" 
              required
              class="w-full bg-[#161e2e] border border-medical-border rounded-2xl py-3 pl-11 pr-4 text-white focus:outline-none focus:border-medical-trust focus:ring-1 focus:ring-medical-trust text-sm font-semibold"
            />
          </div>
        </div>
        <div class="flex flex-col gap-1.5">
          <label class="text-xs font-bold text-medical-gray uppercase tracking-wider">Giới tính *</label>
          <div class="relative">
            <i data-lucide="users" class="absolute left-4 top-1/2 -translate-y-1/2 h-5 w-5 text-medical-gray"></i>
            <select 
              name="gender" 
              required
              class="w-full bg-[#161e2e] border border-medical-border rounded-2xl py-3 pl-11 pr-4 text-white focus:outline-none focus:border-medical-trust focus:ring-1 focus:ring-medical-trust text-sm font-semibold appearance-none cursor-pointer"
            >
              <option value="Nam">Nam</option>
              <option value="Nữ">Nữ</option>
              <option value="Khác">Khác</option>
            </select>
          </div>
        </div>
      </div>

      <!-- 4. Address -->
      <div class="flex flex-col gap-1.5">
        <label class="text-xs font-bold text-medical-gray uppercase tracking-wider">Địa chỉ thường trú *</label>
        <div class="relative">
          <i data-lucide="map-pin" class="absolute left-4 top-1/2 -translate-y-1/2 h-5 w-5 text-medical-gray"></i>
          <input 
            type="text" 
            name="address" 
            placeholder="Hà Nội, Việt Nam" 
            required
            class="w-full bg-[#161e2e] border border-medical-border rounded-2xl py-3.5 pl-12 pr-4 text-white placeholder-slate-600 focus:outline-none focus:border-medical-trust focus:ring-1 focus:ring-medical-trust text-sm font-semibold"
          />
        </div>
      </div>

      <!-- 5. Verification Method Container -->
      <div class="bg-[#161e2e] border border-medical-border rounded-3xl p-5 sm:p-6 space-y-4">
        <label class="text-xs font-bold text-medical-trust uppercase tracking-wider block">Phương án xác thực tài khoản *</label>
        
        <!-- Toggle Switch -->
        <div class="flex bg-medical-dark p-1 rounded-2xl gap-1 border border-medical-border">
          <button 
            type="button" 
            id="togglePhone" 
            onclick="selectVerification('phone')"
            class="flex-1 text-center py-2.5 rounded-xl font-bold text-xs transition-all bg-medical-trust text-white shadow-sm"
          >
            Bằng SĐT (SMS OTP)
          </button>
          <button 
            type="button" 
            id="toggleEmail" 
            onclick="selectVerification('email')"
            class="flex-1 text-center py-2.5 rounded-xl font-bold text-xs transition-all text-medical-gray hover:text-white"
          >
            Bằng Email (Link Kích Hoạt)
          </button>
        </div>

        <!-- Phone Verification Area -->
        <div id="phoneVerificationArea" class="space-y-3">
          <!-- Firebase ReCAPTCHA container -->
          <div id="recaptcha-container" class="flex justify-center"></div>

          <!-- Get SMS OTP Button -->
          <button 
            type="button" 
            id="sendOtpBtn"
            class="w-full bg-medical-coral hover:bg-medical-coralhover text-white py-3 rounded-2xl text-sm font-bold shadow-md shadow-medical-coral/10 transition-all duration-200"
          >
            📲 Gửi Mã OTP qua SMS
          </button>

          <!-- Input OTP Verification Box -->
          <div id="otpInputGroup" class="space-y-3 hidden">
            <label class="text-xs font-bold text-medical-gray block">Nhập mã OTP 6 số nhận được</label>
            <div class="flex gap-2">
              <input 
                type="text" 
                id="otpCode" 
                placeholder="123456" 
                maxlength="6" 
                class="flex-1 bg-medical-dark border border-medical-border rounded-2xl py-3 px-4 text-white placeholder-slate-700 focus:outline-none focus:border-medical-trust text-sm font-bold text-center tracking-widest"
              />
              <button 
                type="button" 
                id="confirmOtpBtn"
                class="bg-medical-trust hover:bg-medical-accent text-white px-6 rounded-2xl text-sm font-bold transition-all"
              >
                Xác nhận
              </button>
            </div>

            <!-- OTP Resend & Countdown Row -->
            <div class="flex justify-between items-center text-xs font-bold pt-1">
              <span id="otpCountdown" class="text-rose-500"></span>
              <button 
                type="button" 
                id="resendOtpBtn"
                disabled
                class="text-medical-gray cursor-not-allowed hover:text-white transition-colors"
              >
                🔄 Gửi lại mã OTP
              </button>
            </div>
          </div>
        </div>

        <!-- Email Verification Area -->
        <div id="emailVerificationArea" class="space-y-3 hidden">
          
          <!-- Send Link Activation Button -->
          <button 
            type="button" 
            id="sendEmailBtn"
            class="w-full bg-medical-trust hover:bg-medical-accent text-white py-3 rounded-2xl text-sm font-bold shadow-md shadow-medical-trust/10 transition-all duration-200"
          >
            📧 Gửi Link Kích Hoạt qua Email
          </button>

          <!-- Confirmation waiting state & Resend button -->
          <div id="emailConfirmationGroup" class="space-y-3 hidden">
            <p class="text-xs text-blue-300 bg-blue-950/20 border border-blue-900/40 p-4 rounded-2xl leading-relaxed font-semibold">
              📬 Thư kích hoạt đã được gửi! Vui lòng mở hộp thư email của bạn, nhấp vào liên kết xác nhận từ Google, sau đó click nút màu xanh dưới đây để lưu hồ sơ bệnh nhân.
            </p>
            <div class="flex flex-col gap-2">
              <button 
                type="button" 
                id="confirmEmailVerificationBtn"
                class="w-full bg-green-600 hover:bg-green-700 text-white py-3 rounded-2xl text-sm font-bold transition-all"
              >
                ✅ Tôi đã bấm kích hoạt link - Xác nhận đăng ký
              </button>

              <div class="flex justify-between items-center text-xs font-bold pt-1">
                <span id="emailCountdown" class="text-rose-500"></span>
                <button 
                  type="button" 
                  id="resendEmailBtn"
                  disabled
                  class="text-medical-gray cursor-not-allowed hover:text-white transition-colors"
                >
                  🔄 Gửi lại Link kích hoạt
                </button>
              </div>
            </div>
          </div>

        </div>

      </div>

      <!-- Hidden inputs -->
      <input type="hidden" name="registerMethod" id="registerMethod" value="phone">
      <input type="hidden" name="firebaseToken" id="firebaseToken">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

    </form>

    <!-- Divider -->
    <div class="flex items-center text-center my-6 text-xs text-medical-gray uppercase tracking-widest font-bold">
      <div class="flex-1 border-t border-medical-border"></div>
      <span class="px-3">Hoặc Đăng Ký Nhanh</span>
      <div class="flex-1 border-t border-medical-border"></div>
    </div>

    <!-- Google Sign Up Button -->
    <button 
      type="button" 
      id="googleSignUpBtn"
      class="w-full inline-flex items-center justify-center gap-3 bg-white border border-slate-200 hover:bg-slate-50 text-slate-700 py-3.5 rounded-full text-sm font-bold shadow-sm transition-all"
    >
      <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" class="w-5 h-5" alt="Google Logo">
      Đăng ký bằng tài khoản Google
    </button>

    <!-- Footer redirect link to login -->
    <div class="text-center mt-6 text-sm font-semibold text-medical-gray">
      Đã có tài khoản? 
      <a th:href="@{/login}" class="text-medical-coral hover:text-medical-coralhover font-bold ml-1 transition-colors">
        Đăng nhập tại đây
      </a>
    </div>

  </div>

  <!-- Client-side navigation toggle handler script -->
  <script>
    /*<![CDATA[*/
    function selectVerification(method) {
      document.getElementById("registerMethod").value = method;
      const togglePhone = document.getElementById("togglePhone");
      const toggleEmail = document.getElementById("toggleEmail");
      const phoneArea = document.getElementById("phoneVerificationArea");
      const emailArea = document.getElementById("emailVerificationArea");

      if (method === 'phone') {
        togglePhone.className = "flex-1 text-center py-2.5 rounded-xl font-bold text-xs transition-all bg-medical-trust text-white shadow-sm";
        toggleEmail.className = "flex-1 text-center py-2.5 rounded-xl font-bold text-xs transition-all text-medical-gray hover:text-white";
        if (phoneArea) phoneArea.style.display = "block";
        if (emailArea) emailArea.style.display = "none";
      } else {
        togglePhone.className = "flex-1 text-center py-2.5 rounded-xl font-bold text-xs transition-all text-medical-gray hover:text-white";
        toggleEmail.className = "flex-1 text-center py-2.5 rounded-xl font-bold text-xs transition-all bg-medical-trust text-white shadow-sm";
        if (phoneArea) phoneArea.style.display = "none";
        if (emailArea) emailArea.style.display = "block";
      }
    }

    if (window.lucide) {
      window.lucide.createIcons();
    }
    /*]]>*/
  </script>

  <!-- Firebase authentication operations module script -->
  <script type="module">
    /*<![CDATA[*/
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
    import {
      getAuth,
      RecaptchaVerifier,
      signInWithPhoneNumber,
      createUserWithEmailAndPassword,
      sendEmailVerification,
      GoogleAuthProvider,
      signInWithPopup
    } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAIQKUHU39e_XI7WPl42pyMKZ56bf6Qi_M",
      authDomain: "disease-risk-analyst.firebaseapp.com",
      projectId: "disease-risk-analyst",
      storageBucket: "disease-risk-analyst.firebasestorage.app",
      messagingSenderId: "900964683479",
      appId: "1:900964683479:web:24d01944be3e157d712a92",
      measurementId: "G-C5KZ770BER"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    auth.languageCode = 'vi';

    let confirmationResult = null;
    let isPhoneOtpSent = false;
    let emailAuthUserCred = null;

    try {
      window.recaptchaVerifier = new RecaptchaVerifier(auth, 'recaptcha-container', {
        'size': 'normal'
      });
    } catch (recaptchaError) {
      console.warn("reCAPTCHA failed to initialize. SMS OTP might not work if offline.", recaptchaError);
    }

    window.resetPhoneOtpState = function () {
      isPhoneOtpSent = false;
    };

    const form = document.getElementById("registerForm");

    function validateFields(method) {
      const email = document.getElementById("email").value.trim();
      const phone = document.getElementById("phone").value.trim();
      const password = document.getElementById("password").value;
      const fullName = document.querySelector("input[name='fullName']").value.trim();
      const dob = document.querySelector("input[name='dob']").value;
      const address = document.querySelector("input[name='address']").value.trim();

      if (method === 'email' && !email) {
        alert("Vui lòng nhập Email.");
        return false;
      }
      if (method === 'phone' && !phone) {
        alert("Vui lòng nhập Số điện thoại.");
        return false;
      }
      if (!password || password.length < 6) {
        alert("Mật khẩu phải tối thiểu 6 ký tự.");
        return false;
      }
      if (!fullName) {
        alert("Vui lòng điền Họ và tên.");
        return false;
      }
      if (!dob) {
        alert("Vui lòng nhập Ngày sinh.");
        return false;
      }
      if (!address) {
        alert("Vui lòng điền Địa chỉ thường trú.");
        return false;
      }
      return true;
    }

    async function sendOtpSMS(isResend = false) {
      if (!validateFields('phone')) return;

      let phoneNumber = document.getElementById("phone").value.trim();
      if (phoneNumber.startsWith("0")) {
        phoneNumber = "+84" + phoneNumber.substring(1);
        document.getElementById("phone").value = phoneNumber;
      }

      const sendBtn = document.getElementById("sendOtpBtn");
      const resendBtn = document.getElementById("resendOtpBtn");

      if (!isResend) {
        sendBtn.disabled = true;
        sendBtn.innerText = "⏳ Đang gửi mã OTP...";
      } else {
        resendBtn.disabled = true;
        resendBtn.innerText = "⏳ Đang gửi lại...";
      }

      try {
        confirmationResult = await signInWithPhoneNumber(auth, phoneNumber, window.recaptchaVerifier);
        showStatus("Đã gửi mã xác thực SMS thành công. Vui lòng kiểm tra điện thoại.", "success");

        sendBtn.style.display = "none";
        document.getElementById("otpInputGroup").style.display = "block";

        startCountdown("otp");
      } catch (error) {
        alert("Lỗi gửi SMS OTP: " + error.message);
        if (!isResend) {
          sendBtn.disabled = false;
          sendBtn.innerText = "📲 Gửi Mã OTP qua SMS";
        } else {
          resendBtn.disabled = false;
          resendBtn.innerText = "🔄 Gửi lại mã OTP";
        }
      }
    }

    async function sendEmailLink(isResend = false) {
      if (!validateFields('email')) return;

      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;
      const sendBtn = document.getElementById("sendEmailBtn");
      const resendBtn = document.getElementById("resendEmailBtn");

      if (!isResend) {
        sendBtn.disabled = true;
        sendBtn.innerText = "⏳ Đang gửi link kích hoạt...";
      } else {
        resendBtn.disabled = true;
        resendBtn.innerText = "⏳ Đang gửi lại...";
      }

      try {
        if (!emailAuthUserCred) {
          emailAuthUserCred = await createUserWithEmailAndPassword(auth, email, password);
        }
        await sendEmailVerification(emailAuthUserCred.user);
        showStatus("Đã gửi link kích hoạt thành công. Vui lòng kiểm tra email của bạn.", "success");

        sendBtn.style.display = "none";
        document.getElementById("emailConfirmationGroup").style.display = "block";

        startCountdown("email");
      } catch (error) {
        alert("Lỗi gửi email kích hoạt: " + error.message);
        if (!isResend) {
          sendBtn.disabled = false;
          sendBtn.innerText = "📧 Gửi Link Kích Hoạt qua Email";
        } else {
          resendBtn.disabled = false;
          resendBtn.innerText = "🔄 Gửi lại Link kích hoạt";
        }
      }
    }

    function startCountdown(type) {
      let seconds = 60;
      const countdownSpan = document.getElementById(type + "Countdown");
      const resendBtn = document.getElementById("resend" + (type === "otp" ? "Otp" : "Email") + "Btn");

      resendBtn.disabled = true;
      resendBtn.className = "text-medical-gray cursor-not-allowed text-xs font-bold";

      const timer = setInterval(() => {
        seconds--;
        if (seconds <= 0) {
          clearInterval(timer);
          countdownSpan.innerText = "";
          resendBtn.disabled = false;
          resendBtn.className = "text-medical-trust hover:text-white cursor-pointer text-xs font-bold";
        } else {
          countdownSpan.innerText = `Gửi lại sau ${seconds}s`;
        }
      }, 1000);
    }

    document.getElementById("sendOtpBtn").addEventListener("click", () => sendOtpSMS(false));
    document.getElementById("resendOtpBtn").addEventListener("click", () => sendOtpSMS(true));

    document.getElementById("sendEmailBtn").addEventListener("click", () => sendEmailLink(false));
    document.getElementById("resendEmailBtn").addEventListener("click", () => sendEmailLink(true));

    const confirmOtpBtn = document.getElementById("confirmOtpBtn");
    confirmOtpBtn.addEventListener("click", async () => {
      const code = document.getElementById("otpCode").value.trim();
      if (code.length !== 6) return alert("Mã OTP phải gồm 6 số.");

      confirmOtpBtn.disabled = true;
      confirmOtpBtn.innerText = "Xác thực...";

      try {
        const result = await confirmationResult.confirm(code);
        const idToken = await result.user.getIdToken();
        document.getElementById("firebaseToken").value = idToken;

        const formData = new FormData(form);
        const response = await fetch("/register", {
          method: "POST",
          body: formData
        });

        if (response.ok) {
          showStatus("Xác thực SĐT thành công và Hồ sơ đã được lưu vào Cơ sở dữ liệu!", "success");
          startCountdownRedirect();
        } else {
          const htmlText = await response.text();
          const parser = new DOMParser();
          const doc = parser.parseFromString(htmlText, "text/html");
          const errorDiv = doc.querySelector(".error");
          const errorMsg = errorDiv ? errorDiv.innerText : "Đăng ký thất bại. Số điện thoại hoặc Email có thể đã được sử dụng.";
          
          showStatus(errorMsg, "error");
          confirmOtpBtn.disabled = false;
          confirmOtpBtn.innerText = "Xác nhận";
        }
      } catch (e) {
        alert("Mã OTP không chính xác: " + e.message);
        confirmOtpBtn.disabled = false;
        confirmOtpBtn.innerText = "Xác nhận";
      }
    });

    const confirmEmailVerificationBtn = document.getElementById("confirmEmailVerificationBtn");
    confirmEmailVerificationBtn.addEventListener("click", async () => {
      if (!emailAuthUserCred) return alert("Chưa thực hiện gửi link đăng ký.");

      confirmEmailVerificationBtn.disabled = true;
      confirmEmailVerificationBtn.innerText = "Đang kiểm tra...";

      try {
        await auth.currentUser.reload();
        const isVerified = auth.currentUser.emailVerified;

        if (!isVerified) {
          alert("Email của bạn vẫn chưa được kích hoạt thành công. Vui lòng mở hòm thư email và nhấp vào liên kết xác nhận!");
          confirmEmailVerificationBtn.disabled = false;
          confirmEmailVerificationBtn.innerText = "Tôi đã bấm kích hoạt link - Xác nhận đăng ký";
          return;
        }

        const idToken = await auth.currentUser.getIdToken(true);
        document.getElementById("firebaseToken").value = idToken;

        const formData = new FormData(form);
        const response = await fetch("/register", {
          method: "POST",
          body: formData
        });

        if (response.ok) {
          showStatus("Xác thực Email thành công và Hồ sơ đã được lưu vào Cơ sở dữ liệu!", "success");
          startCountdownRedirect();
        } else {
          const htmlText = await response.text();
          const parser = new DOMParser();
          const doc = parser.parseFromString(htmlText, "text/html");
          const errorDiv = doc.querySelector(".error");
          const errorMsg = errorDiv ? errorDiv.innerText : "Đăng ký thất bại. Email hoặc Số điện thoại có thể đã được sử dụng.";
          
          showStatus(errorMsg, "error");
          confirmEmailVerificationBtn.disabled = false;
          confirmEmailVerificationBtn.innerText = "Tôi đã bấm kích hoạt link - Xác nhận đăng ký";
        }
      } catch (e) {
        alert("Lỗi kiểm tra xác thực Email: " + e.message);
        confirmEmailVerificationBtn.disabled = false;
        confirmEmailVerificationBtn.innerText = "Tôi đã bấm kích hoạt link - Xác nhận đăng ký";
      }
    });

    const googleBtn = document.getElementById("googleSignUpBtn");
    googleBtn.addEventListener("click", async () => {
      const provider = new GoogleAuthProvider();
      try {
        const result = await signInWithPopup(auth, provider);
        const idToken = await result.user.getIdToken();

        const form = document.createElement("form");
        form.method = "POST";
        form.action = "/login/profile";

        const tokenInput = document.createElement("input");
        tokenInput.type = "hidden";
        tokenInput.name = "firebaseToken";
        tokenInput.value = idToken;
        form.appendChild(tokenInput);

        const emailInput = document.createElement("input");
        emailInput.type = "hidden";
        emailInput.name = "email";
        emailInput.value = result.user.email || "";
        form.appendChild(emailInput);

        const nameInput = document.createElement("input");
        nameInput.type = "hidden";
        nameInput.name = "fullName";
        nameInput.value = result.user.displayName || "";
        form.appendChild(nameInput);

        const csrfInput = document.createElement("input");
        csrfInput.type = "hidden";
        csrfInput.name = "_csrf";
        csrfInput.value = document.querySelector("input[name='_csrf']").value;
        form.appendChild(csrfInput);

        document.body.appendChild(form);
        form.submit();
      } catch (e) {
        alert("Lỗi Google Auth: " + e.message);
      }
    });

    function startCountdownRedirect() {
      document.getElementById("phone").readOnly = true;
      document.getElementById("email").readOnly = true;
      document.getElementById("otpInputGroup").style.display = "none";
      document.getElementById("emailConfirmationGroup").style.display = "none";
      document.querySelector(".verification-box").style.display = "none";

      let seconds = 5;
      const redirectMsgDiv = document.getElementById("redirectMessage");
      redirectMsgDiv.className = "mb-5 p-4 rounded-xl text-sm font-bold border bg-green-500/10 border-green-500/20 text-green-400 text-center";
      redirectMsgDiv.innerText = `Chúc mừng! Hồ sơ của bạn đã được đăng ký và lưu CSDL thành công. Đang chuyển hướng về trang Đăng nhập sau ${seconds} giây...`;

      const interval = setInterval(() => {
        seconds--;
        if (seconds <= 0) {
          clearInterval(interval);
          window.location.href = "/login";
        } else {
          redirectMsgDiv.innerText = `Chúc mừng! Hồ sơ của bạn đã được đăng ký và lưu CSDL thành công. Đang chuyển hướng về trang Đăng nhập sau ${seconds} giây...`;
        }
      }, 1000);
    }

    function showStatus(msg, type) {
      const statusDiv = document.getElementById("statusMessage");
      if (type === "success") {
        statusDiv.innerHTML = `<div class="p-4 rounded-xl text-sm font-bold border bg-green-500/10 border-green-500/20 text-green-400">${msg}</div>`;
      } else {
        statusDiv.innerHTML = `<div class="p-4 rounded-xl text-sm font-bold border bg-rose-500/10 border-rose-500/20 text-rose-400">${msg}</div>`;
      }
    }
    /*]]>*/
  </script>
</body>
</html>
