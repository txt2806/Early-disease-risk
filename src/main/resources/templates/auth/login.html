<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Đăng nhập — CardioCare</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'Segoe UI', sans-serif;
  background: #0a0f1e;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}
.card {
  background: #111827;
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 16px;
  padding: 40px;
  width: 380px;
}
.logo {
  text-align: center;
  margin-bottom: 32px;
}
.logo-icon {
  width: 52px; height: 52px;
  background: linear-gradient(135deg, #e05a5a, #c0392b);
  border-radius: 14px;
  display: flex; align-items: center; justify-content: center;
  font-size: 24px;
  margin: 0 auto 12px;
}
.logo-title {
  color: #e8edf5;
  font-size: 22px;
  font-weight: 700;
}
.logo-sub { color: #8a96b0; font-size: 13px; margin-top: 4px; }
.form-group { margin-bottom: 16px; }
label { display: block; color: #8a96b0; font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
input {
  width: 100%;
  background: #1a2440;
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 8px;
  padding: 11px 14px;
  color: #e8edf5;
  font-size: 14px;
  outline: none;
  transition: border-color 0.2s;
}
input:focus { border-color: #3b82f6; }
.btn {
  width: 100%;
  background: #e05a5a;
  color: white;
  border: none;
  border-radius: 8px;
  padding: 12px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  margin-top: 8px;
  transition: opacity 0.2s;
}
.btn:hover { opacity: 0.9; }

.google-btn {
  background: #ffffff;
  color: #1f2937;
  border: 1px solid #e5e7eb;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  margin-top: 15px;
}
.google-btn img {
  width: 18px;
  height: 18px;
}

.divider {
  display: flex;
  align-items: center;
  text-align: center;
  color: #8a96b0;
  font-size: 12px;
  margin: 20px 0;
}
.divider::before, .divider::after {
  content: '';
  flex: 1;
  border-bottom: 1px solid rgba(255,255,255,0.1);
}
.divider:not(:empty)::before { margin-right: .5em; }
.divider:not(:empty)::after { margin-left: .5em; }

.error {
  background: rgba(224,90,90,0.12);
  border: 1px solid rgba(224,90,90,0.3);
  color: #ff7b7b;
  padding: 10px 14px;
  border-radius: 8px;
  font-size: 13px;
  margin-bottom: 16px;
}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-icon">❤️</div>
    <div class="logo-title">CardioCare</div>
    <div class="logo-sub">Cổng Đăng Nhập Hệ Thống</div>
  </div>

  <div class="error" th:if="${param.error != null and #strings.equals(param.error, 'locked')}">
    Tài khoản của bạn tạm thời bị khóa, vui lòng liên hệ Admin.
  </div>
  <div class="error" th:if="${param.error != null and #strings.equals(param.error, 'true')}">
    Sai tên đăng nhập hoặc mật khẩu!
  </div>
  <div class="error" th:if="${error}" th:text="${error}"></div>
  <div class="error" th:if="${param.logout}" style="background:rgba(16,185,129,0.12);border-color:rgba(16,185,129,0.3);color:#34d399;">
    Đã đăng xuất thành công.
  </div>

  <form th:action="@{/login}" method="post">
    <div class="form-group">
      <label>Tên đăng nhập</label>
      <input type="text" name="username" placeholder="doctor01@cardio.com" required autofocus>
    </div>
    <div class="form-group">
      <label>Mật khẩu</label>
      <input type="password" name="password" placeholder="••••••••" required>
    </div>
    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
    <button class="btn" type="submit">Đăng nhập</button>
  </form>

  <div class="divider">HOẶC</div>

  <button class="btn google-btn" id="googleLoginBtn">
    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google Logo">
    Đăng nhập bằng Google
  </button>
  
  <!-- Form ẩn gửi Google Token lên Backend xử lý -->
  <form id="googleLoginForm" th:action="@{/login/profile}" method="post">
    <input type="hidden" name="firebaseToken" id="firebaseToken">
    <input type="hidden" name="email" id="googleEmail">
    <input type="hidden" name="fullName" id="googleFullName">
    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
  </form>

  <div style="text-align: center; margin-top: 20px; font-size: 13px; color: #8a96b0;">
    Bạn là bệnh nhân mới? <a th:href="@{/register}" style="color: #e05a5a; text-decoration: none; font-weight: 600;">Đăng ký ngay</a>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
  import { getAuth, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAIQKUHU39e_XI7WPl42pyMKZ56bf6Qi_M",
    authDomain: "disease-risk-analyst.firebaseapp.com",
    projectId: "disease-risk-analyst",
    storageBucket: "disease-risk-analyst.firebasestorage.app",
    messagingSenderId: "900964683479",
    appId: "1:900964683479:web:24d01944be3e157d712a92",
    measurementId: "G-C5KZ770BER"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  const googleLoginBtn = document.getElementById("googleLoginBtn");
  googleLoginBtn.addEventListener("click", async () => {
    const provider = new GoogleAuthProvider();
    try {
      const result = await signInWithPopup(auth, provider);
      const idToken = await result.user.getIdToken();
      
      document.getElementById("firebaseToken").value = idToken;
      document.getElementById("googleEmail").value = result.user.email || "";
      document.getElementById("googleFullName").value = result.user.displayName || "";
      document.getElementById("googleLoginForm").submit();
    } catch (e) {
      alert("Lỗi Google Auth: " + e.message);
    }
  });</script>
</body>
</html>
