<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đăng nhập — CardioCare</title>
  
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    /*<![CDATA[*/
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            medical: {
              dark: '#0a0f1e', // Màu nền tối của hệ thống
              card: '#111827', // Màu nền thẻ card tối
              border: 'rgba(255,255,255,0.08)',
              trust: '#2563eb', // Accent blue
              accent: '#3b82f6',
              light: '#e8edf5', // Chữ trắng sáng
              gray: '#8a96b0', // Chữ xám
              coral: '#f43f5e',
              coralhover: '#e11d48'
            }
          },
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
          }
        }
      }
    }
    /*]]>*/
  </script>

  <!-- Google Fonts: Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  
  <!-- Lucide Icons CDN -->
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-medical-dark text-medical-light antialiased font-sans min-h-screen flex items-center justify-center relative overflow-hidden p-4">
  
  <!-- Background glow decoration for premium vibe -->
  <div class="absolute -top-40 -right-40 w-96 h-96 bg-blue-500/10 rounded-full blur-[100px] pointer-events-none"></div>
  <div class="absolute -bottom-40 -left-40 w-96 h-96 bg-rose-500/5 rounded-full blur-[100px] pointer-events-none"></div>

  <!-- Login Card (Dark Theme) -->
  <div class="w-full max-w-md bg-medical-card border border-medical-border rounded-3xl shadow-2xl p-8 sm:p-10 relative z-10">
    
    <!-- Logo & Header -->
    <div class="flex flex-col items-center text-center mb-8">
      <div class="flex items-center gap-2 cursor-pointer mb-2" onclick="window.location.href='/'">
        <i data-lucide="heart-pulse" class="h-9 w-9 text-medical-coral animate-pulse"></i>
        <span class="text-white font-extrabold text-2xl tracking-tight">
          CARDIO<span class="text-medical-coral">CARE</span>
        </span>
      </div>
      <p class="text-medical-gray text-sm font-semibold">Cổng đăng nhập hệ thống chuyên môn</p>
    </div>

    <!-- Error Messages (Thymeleaf) -->
    <div class="mb-5 p-4 rounded-xl text-sm font-bold border bg-rose-500/10 border-rose-500/20 text-rose-400" th:if="${param.error != null and #strings.equals(param.error, 'locked')}">
      Tài khoản của bạn tạm thời bị khóa, vui lòng liên hệ Admin.
    </div>
    <div class="mb-5 p-4 rounded-xl text-sm font-bold border bg-rose-500/10 border-rose-500/20 text-rose-400" th:if="${param.error != null and #strings.equals(param.error, 'true')}">
      Sai tên đăng nhập hoặc mật khẩu!
    </div>
    <div class="mb-5 p-4 rounded-xl text-sm font-bold border bg-rose-500/10 border-rose-500/20 text-rose-400" th:if="${error}" th:text="${error}"></div>
    <div class="mb-5 p-4 rounded-xl text-sm font-bold border bg-green-500/10 border-green-500/20 text-green-400" th:if="${param.logout}">
      Đã đăng xuất thành công.
    </div>

    <!-- Form -->
    <form th:action="@{/login}" method="post" class="space-y-5 text-left">
      
      <!-- Username -->
      <div class="flex flex-col gap-1.5">
        <label class="text-xs font-bold text-medical-gray uppercase tracking-wider">Tên đăng nhập</label>
        <div class="relative">
          <i data-lucide="user" class="absolute left-4 top-1/2 -translate-y-1/2 h-5 w-5 text-medical-gray"></i>
          <input 
            type="text" 
            name="username" 
            placeholder="doctor01@cardio.com" 
            required 
            autofocus
            class="w-full bg-[#161e2e] border border-medical-border rounded-2xl py-3.5 pl-12 pr-4 text-white placeholder-slate-600 focus:outline-none focus:border-medical-trust focus:ring-1 focus:ring-medical-trust transition-all text-sm font-semibold"
          />
        </div>
      </div>

      <!-- Password -->
      <div class="flex flex-col gap-1.5">
        <label class="text-xs font-bold text-medical-gray uppercase tracking-wider">Mật khẩu</label>
        <div class="relative">
          <i data-lucide="lock" class="absolute left-4 top-1/2 -translate-y-1/2 h-5 w-5 text-medical-gray"></i>
          <input 
            type="password" 
            name="password" 
            placeholder="••••••••" 
            required
            class="w-full bg-[#161e2e] border border-medical-border rounded-2xl py-3.5 pl-12 pr-4 text-white placeholder-slate-600 focus:outline-none focus:border-medical-trust focus:ring-1 focus:ring-medical-trust transition-all text-sm font-semibold"
          />
        </div>
      </div>

      <!-- CSRF Token -->
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

      <!-- Submit Button -->
      <button 
        type="submit" 
        class="w-full bg-medical-coral hover:bg-medical-coralhover text-white py-3.5 rounded-full text-base font-bold shadow-md shadow-medical-coral/10 hover:-translate-y-0.5 transition-all duration-200"
      >
        Đăng nhập hệ thống
      </button>

    </form>

    <!-- Divider -->
    <div class="flex items-center text-center my-6 text-xs text-medical-gray uppercase tracking-widest font-bold">
      <div class="flex-1 border-t border-medical-border"></div>
      <span class="px-3">Hoặc</span>
      <div class="flex-1 border-t border-medical-border"></div>
    </div>

    <!-- Google Authentication Button -->
    <button 
      id="googleLoginBtn" 
      class="w-full inline-flex items-center justify-center gap-3 bg-white border border-slate-200 hover:bg-slate-50 text-slate-700 py-3.5 rounded-full text-sm font-bold shadow-sm transition-all"
    >
      <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" class="w-5 h-5" alt="Google Logo">
      Đăng nhập bằng Google
    </button>
    
    <!-- Hidden Google authentication submission form -->
    <form id="googleLoginForm" th:action="@{/login/profile}" method="post">
      <input type="hidden" name="firebaseToken" id="firebaseToken">
      <input type="hidden" name="email" id="googleEmail">
      <input type="hidden" name="fullName" id="googleFullName">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
    </form>

    <!-- Register Redirect Link -->
    <div class="text-center mt-6 text-sm font-semibold text-medical-gray">
      Bạn là bệnh nhân mới? 
      <a th:href="@{/register}" class="text-medical-coral hover:text-medical-coralhover font-bold ml-1 transition-colors">
        Đăng ký ngay
      </a>
    </div>

  </div>

  <!-- Lucide Script init -->
  <script>
    /*<![CDATA[*/
    if (window.lucide) {
      window.lucide.createIcons();
    }
    /*]]>*/
  </script>

  <!-- Firebase Auth Configuration and Execution script -->
  <script type="module">
    /*<![CDATA[*/
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
    import { getAuth, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAIQKUHU39e_XI7WPl42pyMKZ56bf6Qi_M",
      authDomain: "disease-risk-analyst.firebaseapp.com",
      projectId: "disease-risk-analyst",
      storageBucket: "disease-risk-analyst.firebasestorage.app",
      messagingSenderId: "900964683479",
      appId: "1:900964683479:web:24d01944be3e157d712a92",
      measurementId: "G-C5KZ770BER"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    const googleLoginBtn = document.getElementById("googleLoginBtn");
    googleLoginBtn.addEventListener("click", async () => {
      const provider = new GoogleAuthProvider();
      try {
        const result = await signInWithPopup(auth, provider);
        const idToken = await result.user.getIdToken();
        
        document.getElementById("firebaseToken").value = idToken;
        document.getElementById("googleEmail").value = result.user.email || "";
        document.getElementById("googleFullName").value = result.user.displayName || "";
        document.getElementById("googleLoginForm").submit();
      } catch (e) {
        alert("Lỗi Google Auth: " + e.message);
      }
    });
    /*]]>*/
  </script>
</body>
</html>
