<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Tiếp đón & Tạo lịch hẹn')}"></head>
<body>
<div th:replace="~{fragments :: receptionSidebar('book-appointment')}"></div>

<main class="main">
  <header th:replace="~{fragments :: simpleTopbar('Tiếp đón & Tạo lịch hẹn')}"></header>
  <div class="content">

    <div class="alert-success" th:if="${success}" th:text="${success}" style="padding: 12px; margin-bottom: 20px; border-radius: 8px; background: rgba(16, 185, 129, 0.15); color: #34d399; border: 1px solid rgba(16, 185, 129, 0.3);"></div>
    <div class="alert-danger" th:if="${error}" th:text="${error}" style="padding: 12px; margin-bottom: 20px; border-radius: 8px; background: rgba(239, 68, 68, 0.15); color: #f87171; border: 1px solid rgba(239, 68, 68, 0.3);"></div>

    <div class="card" style="max-width: 650px; margin: 0 auto;">
      <div class="card-header">
        <div class="card-title">📝 Tạo Lịch khám & Phân phòng trực tiếp</div>
      </div>
      <form th:action="@{/reception/appointments/new/save}" method="post" style="padding-top:10px;">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

        <!-- Chọn bệnh nhân -->
        <div class="form-group" style="margin-bottom: 16px;">
          <label style="color:#8a96b0; font-size:12px; font-weight:600; margin-bottom:6px; display:block;">Bệnh nhân đăng ký khám</label>
          <input type="text" id="patientSearchInput" placeholder="🔍 Nhập tên hoặc SĐT để lọc nhanh..." 
                 style="width: 100%; background: #131a30; border: 1px solid rgba(255,255,255,0.08); border-radius: 8px; padding: 10px; color: #e8edf5; font-size: 13px; outline: none; margin-bottom: 8px;">
          <select name="patientId" required 
                  style="width: 100%; background: #1a2440; border: 1px solid rgba(255,255,255,0.08); border-radius: 8px; padding: 12px; color: #e8edf5; font-size: 14px; outline: none; cursor:pointer;">
            <option value="" disabled th:selected="${param.patientId == null}">-- Chọn Bệnh nhân từ danh sách --</option>
            <option th:each="p : ${patients}" 
                    th:value="${p.patientId}" 
                    th:selected="${param.patientId != null && param.patientId[0] == #strings.toString(p.patientId)}"
                    th:text="${p.fullName + ' - SĐT: ' + (p.phone != null ? p.phone : 'Không có') + ' (Sinh ngày: ' + #temporals.format(p.dob, 'dd/MM/yyyy') + ')'}"></option>
          </select>
        </div>

        <!-- Chọn bác sĩ -->
        <div class="form-group" style="margin-bottom: 16px;">
          <label style="color:#8a96b0; font-size:12px; font-weight:600; margin-bottom:6px; display:block;">Bác sĩ phụ trách</label>
          <select name="doctorId" required 
                  style="width: 100%; background: #1a2440; border: 1px solid rgba(255,255,255,0.08); border-radius: 8px; padding: 12px; color: #e8edf5; font-size: 14px; outline: none; cursor:pointer;">
            <option value="" disabled selected>-- Chọn Bác sĩ Tim mạch --</option>
            <option th:each="doc : ${doctors}" th:value="${doc.doctorId}" th:text="${doc.fullName + ' - Chuyên khoa: ' + doc.specialty}"></option>
          </select>
        </div>

        <!-- Xếp phòng khám -->
        <div class="form-group" style="margin-bottom: 16px;">
          <label style="color:#8a96b0; font-size:12px; font-weight:600; margin-bottom:6px; display:block;">Xếp phòng khám</label>
          <input type="text" name="roomNumber" placeholder="Ví dụ: Phòng 101, Phòng 102..." required 
                 style="width: 100%; background: #1a2440; border: 1px solid rgba(255,255,255,0.08); border-radius: 8px; padding: 12px; color: #e8edf5; font-size: 14px; outline: none;">
        </div>

        <div style="display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-bottom:16px;">
          <!-- Chọn ngày -->
          <div class="form-group">
            <label style="color:#8a96b0; font-size:12px; font-weight:600; margin-bottom:6px; display:block;">Ngày khám</label>
            <input type="date" name="scheduledDate" id="scheduledDate" required 
                   style="width: 100%; background: #1a2440; border: 1px solid rgba(255,255,255,0.08); border-radius: 8px; padding: 12px; color: #e8edf5; font-size: 14px; outline: none;">
          </div>

          <!-- Chọn giờ -->
          <div class="form-group">
            <label style="color:#8a96b0; font-size:12px; font-weight:600; margin-bottom:6px; display:block;">Giờ khám</label>
            <select name="timeSlot" required 
                    style="width: 100%; background: #1a2440; border: 1px solid rgba(255,255,255,0.08); border-radius: 8px; padding: 12px; color: #e8edf5; font-size: 14px; outline: none; cursor:pointer;">
              <option value="08:00:00">08:00 - 09:00</option>
              <option value="09:00:00">09:00 - 10:00</option>
              <option value="10:00:00">10:00 - 11:00</option>
              <option value="11:00:00">11:00 - 12:00</option>
              <option value="13:30:00">13:30 - 14:30</option>
              <option value="14:30:00">14:30 - 15:30</option>
              <option value="15:30:00">15:30 - 16:30</option>
              <option value="16:30:00">16:30 - 17:30</option>
            </select>
          </div>
        </div>

        <!-- Tình trạng sơ bộ -->
        <div class="form-group" style="margin-bottom: 16px;">
          <label style="color:#8a96b0; font-size:12px; font-weight:600; margin-bottom:6px; display:block;">Tình trạng sơ bộ (Bệnh nhân tự khai báo hoặc lễ tân ghi nhận)</label>
          <textarea name="preliminaryStatus" rows="3" placeholder="Ví dụ: Đau tức ngực kèm theo vã mồ hôi, nhịp tim đo tại chỗ 105 bpm..." required 
                    style="width: 100%; background: #1a2440; border: 1px solid rgba(255,255,255,0.08); border-radius: 8px; padding: 12px; color: #e8edf5; font-size: 14px; outline: none; font-family:inherit; resize:vertical;"></textarea>
        </div>

        <!-- Trạng thái khám -->
        <div class="form-group" style="margin-bottom: 24px;">
          <label style="color:#8a96b0; font-size:12px; font-weight:600; margin-bottom:6px; display:block;">Trạng thái khám ban đầu</label>
          <select name="status" required 
                  style="width: 100%; background: #1a2440; border: 1px solid rgba(255,255,255,0.08); border-radius: 8px; padding: 12px; color: #e8edf5; font-size: 14px; outline: none; cursor:pointer;">
            <option value="CheckedIn" selected>Bệnh nhân đã đến phòng khám (CheckedIn)</option>
            <option value="Confirmed">Lịch hẹn đã xác nhận (Confirmed)</option>
            <option value="Pending">Chờ duyệt (Pending)</option>
          </select>
        </div>

        <button type="submit" class="btn" style="width:100%; background: linear-gradient(135deg, #3b82f6, #1d4ed8); color:white; border:none; padding:12px; border-radius:8px; font-weight:600; cursor:pointer; font-size:14px; transition: opacity 0.2s;">Xác nhận Đăng ký & Phân phòng</button>
      </form>
    </div>

  </div>
</main>
<script>
// Default date to today
const dateInput = document.getElementById('scheduledDate');
if (dateInput) {
  const today = new Date().toISOString().split('T')[0];
  dateInput.value = today;
}

document.addEventListener("DOMContentLoaded", function() {
  const searchInput = document.getElementById("patientSearchInput");
  const select = document.querySelector('select[name="patientId"]');
  if (searchInput && select) {
    const originalOptions = Array.from(select.options);
    
    searchInput.addEventListener("input", function() {
      const query = searchInput.value.toLowerCase().trim();
      const currentVal = select.value;
      
      select.innerHTML = "";
      
      originalOptions.forEach(function(opt) {
        if (opt.value === "") {
          select.appendChild(opt);
          return;
        }
        const text = opt.textContent.toLowerCase();
        if (text.includes(query)) {
          select.appendChild(opt);
        }
      });
      
      // Restore selected value if it's still available in filtered options
      if (Array.from(select.options).some(o => o.value === currentVal)) {
        select.value = currentVal;
      }
    });
  }
});
</script>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
