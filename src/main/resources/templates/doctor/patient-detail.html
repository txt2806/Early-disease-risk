<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Hồ sơ bệnh nhân')}"></head>
<body>
<div th:replace="~{fragments :: sidebar('patients')}"></div>
<main class="main">
  <header th:replace="~{fragments :: topbar('Hồ sơ bệnh nhân')}"></header>
  <div class="content">

    <div class="alert-success" th:if="${success}" th:text="${success}"></div>
    <div style="background:rgba(224,90,90,0.12);border:1px solid rgba(224,90,90,0.3);color:#ff7b7b;padding:12px 16px;border-radius:8px;margin-bottom:16px;font-size:13px;"
         th:if="${error}" th:text="${error}"></div>

    <!-- Patient header -->
    <div class="detail-header">
      <div class="detail-info">
        <div class="detail-avatar" th:text="${patient.fullName.charAt(0)}"
             style="background:linear-gradient(135deg,#e05a5a,#c0392b);">A</div>
        <div>
          <div class="detail-name" th:text="${patient.fullName}">Tên bệnh nhân</div>
          <div class="detail-meta">
            <span th:text="'Sinh: ' + ${#temporals.format(patient.dob, 'dd/MM/yyyy')}">Sinh:</span>
            <span th:text="${patient.gender}">Nam</span>
            <span th:text="${patient.phone}">SĐT</span>
            <span th:text="${patient.address}">Địa chỉ</span>
          </div>
        </div>
      </div>
      <div class="detail-actions">
        <a th:href="@{/doctor/ai-predict(patientId=${patient.patientId})}" class="btn btn-ai">
          <i class="ti ti-brain"></i> Dự đoán AI
        </a>
        <a th:href="@{/doctor/patients}" class="btn btn-ghost">← Quay lại</a>
      </div>
    </div>

    <!-- Lịch sử khám -->
    <div class="card">
      <div class="card-header">
        <div class="card-title"><i class="ti ti-clipboard-list"></i> Lịch sử khám</div>
        <span style="font-size:12px;color:#8a96b0;" th:text="${records.size()} + ' lần khám'">0 lần khám</span>
      </div>

      <!-- Từng lần khám -->
      <div th:each="r : ${records}" style="border-bottom:1px solid rgba(255,255,255,0.07);padding:20px;">

        <!-- Header lần khám -->
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px;">
          <div>
            <div style="font-size:13px;font-weight:600;color:#e8edf5;">
              Lần khám: <span th:text="${#temporals.format(r.visitDate, 'dd/MM/yyyy HH:mm')}" style="font-family:monospace;color:#60a5fa;">--</span>
            </div>
            <div style="margin-top:4px;">
              <span th:if="${r.aiRiskPrediction != null}"
                    class="risk-badge"
                    th:classappend="'risk-' + ${r.aiRiskPrediction.riskLevel}"
                    th:text="${r.aiRiskPrediction.riskLevel + ' · ' + #numbers.formatDecimal(r.aiRiskPrediction.riskScore,1,1) + '%'}">--</span>
              <span th:if="${r.aiRiskPrediction == null}" style="color:#4a5568;font-size:12px;">Chưa có AI</span>
            </div>
          </div>
          <button onclick="toggleEdit(this)"
                  th:data-record-id="${r.recordId}"
                  class="action-btn primary" style="font-size:11px;">
            ✏️ Sửa hồ sơ
          </button>
        </div>

        <!-- Hiển thị ghi chú hiện tại -->
        <div th:id="'view-' + ${r.recordId}">
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;">
            <div>
              <div style="font-size:11px;color:#8a96b0;text-transform:uppercase;margin-bottom:4px;">Ghi chú lâm sàng</div>
              <div style="font-size:13px;color:#cbd5e1;background:#0f1628;padding:10px;border-radius:8px;min-height:40px;"
                   th:text="${r.consultationNotes ?: 'Chưa có ghi chú'}">--</div>
            </div>
            <div>
              <div style="font-size:11px;color:#8a96b0;text-transform:uppercase;margin-bottom:4px;">Phác đồ điều trị</div>
              <div style="font-size:13px;color:#cbd5e1;background:#0f1628;padding:10px;border-radius:8px;min-height:40px;"
                   th:text="${r.treatmentPlan ?: 'Chưa có phác đồ'}">--</div>
            </div>
          </div>
        </div>

        <!-- Form sửa hồ sơ (ẩn mặc định) - BR04: chỉ UPDATE không DELETE -->
        <div th:id="'edit-' + ${r.recordId}" style="display:none;">
          <form th:action="@{/doctor/records/{id}/update(id=${r.recordId})}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <input type="hidden" name="patientId" th:value="${patient.patientId}">
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;">
              <div class="form-group">
                <label class="form-label">Ghi chú lâm sàng</label>
                <textarea class="form-input" name="consultationNotes" rows="3"
                          th:text="${r.consultationNotes}"
                          style="resize:vertical;"></textarea>
              </div>
              <div class="form-group">
                <label class="form-label">Phác đồ điều trị</label>
                <textarea class="form-input" name="treatmentPlan" rows="3"
                          th:text="${r.treatmentPlan}"
                          style="resize:vertical;"></textarea>
              </div>
            </div>
            <div style="display:flex;gap:8px;">
              <button type="submit" class="btn btn-primary" style="font-size:12px;padding:7px 16px;">
                <i class="ti ti-device-floppy"></i> Lưu thay đổi
              </button>
              <button type="button" onclick="toggleEdit(this)"
                      th:data-record-id="${r.recordId}"
                      class="btn btn-ghost" style="font-size:12px;padding:7px 16px;">Hủy</button>
            </div>
          </form>
        </div>

        <!-- Chẩn đoán ICD-10 -->
        <div style="margin-top:14px;">
          <div style="font-size:11px;color:#8a96b0;text-transform:uppercase;margin-bottom:8px;">
            Chẩn đoán ICD-10
          </div>

          <!-- Danh sách chẩn đoán hiện có -->
          <div th:if="${recordDiagnosesMap[r.recordId] != null and !#lists.isEmpty(recordDiagnosesMap[r.recordId])}"
               style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px;">
            <div th:each="d : ${recordDiagnosesMap[r.recordId]}"
                 style="background:rgba(16,185,129,0.12);border:1px solid rgba(16,185,129,0.3);border-radius:6px;padding:4px 10px;font-size:12px;color:#34d399;">
              <span th:text="${d.icdCatalog.icdCode}" style="font-family:monospace;font-weight:600;">I10</span>
              — <span th:text="${d.icdCatalog.diseaseName}">Tên bệnh</span>
              <span th:if="${d.notes}" style="color:#8a96b0;" th:text="' (' + ${d.notes} + ')'"></span>
            </div>
          </div>
          <div th:if="${recordDiagnosesMap[r.recordId] == null or #lists.isEmpty(recordDiagnosesMap[r.recordId])}"
               style="font-size:12px;color:#4a5568;margin-bottom:10px;">
            ⚠️ Chưa có chẩn đoán ICD-10 — BR06: Cần thêm ít nhất 1 mã ICD
          </div>

          <!-- Form thêm chẩn đoán ICD-10 -->
          <form th:action="@{/doctor/records/{id}/diagnosis(id=${r.recordId})}" method="post"
                style="display:flex;gap:8px;flex-wrap:wrap;align-items:flex-end;">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <input type="hidden" name="patientId" th:value="${patient.patientId}">
            <div class="form-group" style="flex:1;min-width:200px;">
              <label class="form-label">Mã ICD-10</label>
              <input class="form-input icd-search"
                     type="text" name="icdCode"
                     placeholder="VD: I10, I21, I48..."
                     autocomplete="off" required
                     style="font-family:monospace;">
              <div class="icd-dropdown" style="display:none;position:absolute;z-index:100;background:#111827;border:1px solid rgba(255,255,255,0.12);border-radius:8px;max-height:180px;overflow-y:auto;width:300px;"></div>
            </div>
            <div class="form-group" style="flex:2;min-width:200px;">
              <label class="form-label">Ghi chú thêm (không bắt buộc)</label>
              <input class="form-input" type="text" name="diagnosisNotes"
                     placeholder="VD: Giai đoạn 2, đang điều trị...">
            </div>
            <button type="submit" class="btn btn-primary" style="font-size:12px;padding:10px 14px;flex-shrink:0;">
              <i class="ti ti-plus"></i> Thêm chẩn đoán
            </button>
          </form>
        </div>

      </div><!-- end each record -->

      <div th:if="${#lists.isEmpty(records)}"
           style="text-align:center;color:#8a96b0;padding:30px;">
        Chưa có lịch sử khám
      </div>
    </div>

  </div>
</main>

<script th:src="@{/js/main.js}"></script>
<script>
// Toggle form sửa hồ sơ
function toggleEdit(btn) {
  const id = btn.getAttribute('data-record-id');
  const viewEl = document.getElementById('view-' + id);
  const editEl = document.getElementById('edit-' + id);
  if (editEl.style.display === 'none') {
    editEl.style.display = 'block';
    viewEl.style.display = 'none';
    btn.textContent = '✕ Hủy sửa';
  } else {
    editEl.style.display = 'none';
    viewEl.style.display = 'block';
    btn.textContent = '✏️ Sửa hồ sơ';
  }
}

// ICD-10 Autocomplete
document.addEventListener('DOMContentLoaded', function() {
  document.querySelectorAll('.icd-search').forEach(function(input) {
    const dropdown = input.nextElementSibling;
    let timeout = null;

    input.addEventListener('input', function() {
      clearTimeout(timeout);
      const q = input.value.trim();
      if (q.length < 1) { dropdown.style.display = 'none'; return; }
      timeout = setTimeout(function() {
        fetch('/doctor/icd/search?q=' + encodeURIComponent(q))
          .then(r => r.json())
          .then(data => {
            if (!data.length) { dropdown.style.display = 'none'; return; }
            dropdown.innerHTML = data.map(i =>
              '<div onclick="selectIcd(this)" data-code="' + i.icdCode + '" data-name="' + i.diseaseName + '" ' +
              'style="padding:8px 12px;cursor:pointer;font-size:13px;border-bottom:1px solid rgba(255,255,255,0.06);">' +
              '<span style="font-family:monospace;color:#60a5fa;font-weight:600;">' + i.icdCode + '</span>' +
              ' — ' + i.diseaseName + '</div>'
            ).join('');
            dropdown.style.display = 'block';
          });
      }, 250);
    });

    input.addEventListener('blur', function() {
      setTimeout(() => dropdown.style.display = 'none', 200);
    });
  });
});

function selectIcd(el) {
  const input = el.parentElement.previousElementSibling;
  input.value = el.getAttribute('data-code');
  el.parentElement.style.display = 'none';
}
</script>
</body>
</html>
