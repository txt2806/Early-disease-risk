<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Bệnh nhân')}"></head>
<body>
<div th:replace="~{fragments :: sidebar('patients')}"></div>

<main class="main">
  <header th:replace="~{fragments :: topbar('Danh sách bệnh nhân')}"></header>
  <div class="content">

    <div class="alert-success" th:if="${success}" th:text="${success}"></div>

    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
      <div>
        <div style="font-size:22px;font-weight:700;color:#e8edf5;margin-bottom:4px;">Bệnh nhân</div>
        <div style="font-size:13px;color:#8a96b0;" th:text="${totalItems != null ? totalItems : patients.size()} + ' bệnh nhân'">0 bệnh nhân</div>
      </div>
      <a th:href="@{/doctor/patients/new}" class="btn btn-primary">
        <i class="ti ti-plus"></i> Thêm bệnh nhân
      </a>
    </div>

    <!-- Search bar -->
    <form th:action="@{/doctor/patients}" method="get" style="margin-bottom:16px;">
      <div class="topbar-search" style="width:100%;max-width:360px;">
        <i class="ti ti-search"></i>
        <input type="text" name="search" th:value="${search}" placeholder="Tìm theo tên...">
        <button type="submit" class="btn btn-primary" style="padding:6px 14px;font-size:12px;">Tìm</button>
      </div>
    </form>

    <div class="card">
      <table class="patient-table">
        <thead>
          <tr>
            <th>Bệnh nhân</th>
            <th>Ngày sinh</th>
            <th>Giới tính</th>
            <th>Điện thoại</th>
            <th>Địa chỉ</th>
            <th></th>
          </tr>
        </thead>
        <tbody>
          <tr th:each="p : ${patients}">
            <td>
              <div class="patient-name-cell">
                <div class="patient-avatar" th:text="${p.fullName.charAt(0)}">A</div>
                <div>
                  <div class="patient-fullname" th:text="${p.fullName}">Tên</div>
                  <div class="patient-id" th:text="'#BN' + p.patientId">BN001</div>
                </div>
              </div>
            </td>
            <td th:text="${#temporals.format(p.dob, 'dd/MM/yyyy')}" style="color:#8a96b0;font-size:13px;">01/01/1990</td>
            <td th:text="${p.gender}" style="color:#8a96b0;font-size:13px;">Nam</td>
            <td th:text="${p.phone}" style="color:#8a96b0;font-size:13px;">0901234567</td>
            <td th:text="${p.address}" style="color:#8a96b0;font-size:12px;max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">Địa chỉ</td>
            <td>
              <div style="display:flex;gap:6px;">
                <a th:href="@{/doctor/patients/{id}(id=${p.patientId})}" class="action-btn primary">
                  <i class="ti ti-file-text" style="font-size:12px"></i> Hồ sơ
                </a>
                <a th:href="@{/doctor/ai-predict(patientId=${p.patientId})}" class="action-btn">
                  <i class="ti ti-brain" style="font-size:12px"></i> AI
                </a>
              </div>
            </td>
          </tr>
          <tr th:if="${#lists.isEmpty(patients)}">
            <td colspan="6" style="text-align:center;color:#8a96b0;padding:30px;">
              <i class="ti ti-users" style="font-size:32px;display:block;margin-bottom:8px;opacity:0.3;"></i>
              Không tìm thấy bệnh nhân nào
            </td>
          </tr>
        </tbody>
      </table>
    </div>
    
    <!-- Pagination -->
    <div th:if="${totalPages > 1}" class="pagination-container">
      <div class="pagination-info">
        Hiển thị trang <span th:text="${currentPage + 1}">1</span> / <span th:text="${totalPages}">5</span> 
        (Tổng số <span th:text="${totalItems}">48</span> bệnh nhân)
      </div>
      <div class="pagination-buttons">
        <!-- First Page -->
        <a th:href="@{/doctor/patients(page=0, search=${search})}" 
           class="page-btn" th:classappend="${currentPage == 0} ? 'disabled' : ''" title="Trang đầu">
          <i class="ti ti-chevrons-left"></i>
        </a>
        <!-- Prev Page -->
        <a th:href="@{/doctor/patients(page=${currentPage - 1}, search=${search})}" 
           class="page-btn" th:classappend="${currentPage == 0} ? 'disabled' : ''" title="Trang trước">
          <i class="ti ti-chevron-left"></i>
        </a>
        
        <!-- Page Numbers -->
        <th:block th:each="i : ${#numbers.sequence(0, totalPages - 1)}">
          <a th:if="${i >= currentPage - 2 && i <= currentPage + 2}"
             th:href="@{/doctor/patients(page=${i}, search=${search})}" 
             th:text="${i + 1}"
             class="page-btn" th:classappend="${currentPage == i} ? 'active' : ''">
          </a>
        </th:block>

        <!-- Next Page -->
        <a th:href="@{/doctor/patients(page=${currentPage + 1}, search=${search})}" 
           class="page-btn" th:classappend="${currentPage == totalPages - 1} ? 'disabled' : ''" title="Trang sau">
          <i class="ti ti-chevron-right"></i>
        </a>
        <!-- Last Page -->
        <a th:href="@{/doctor/patients(page=${totalPages - 1}, search=${search})}" 
           class="page-btn" th:classappend="${currentPage == totalPages - 1} ? 'disabled' : ''" title="Trang cuối">
          <i class="ti ti-chevrons-right"></i>
        </a>
      </div>
    </div>

  </div>
</main>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
