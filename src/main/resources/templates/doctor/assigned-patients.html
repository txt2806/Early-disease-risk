<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Bệnh nhân phụ trách')}"></head>
<body>
<div th:replace="~{fragments :: sidebar('assigned-patients')}"></div>
<main class="main">
  <header th:replace="~{fragments :: topbar('Bệnh nhân phụ trách')}"></header>
  <div class="content">
    <div class="alert-success" th:if="${success}" th:text="${success}"></div>
    
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
      <div>
        <div style="font-size:22px;font-weight:700;color:#e8edf5;margin-bottom:4px;">Bệnh nhân phụ trách</div>
        <div style="font-size:13px;color:#8a96b0;" th:text="${totalItems} + ' bệnh nhân phụ trách'">0 bệnh nhân</div>
      </div>
    </div>
    
    <form th:action="@{/doctor/assigned-patients}" method="get" style="margin-bottom:20px; display:flex; gap:12px; align-items:center; flex-wrap:wrap;">
      <div class="topbar-search" style="width:100%; max-width:280px; margin:0;">
        <i class="ti ti-search"></i>
        <input type="text" name="search" th:value="${search}" placeholder="Tìm theo tên...">
      </div>
      <div style="display:flex; align-items:center; gap:8px;">
        <label style="color:#8a96b0; font-size:13px; font-weight:600;">Lịch khám ngày:</label>
        <input type="date" name="dateStr" th:value="${selectedDate}" 
               style="background:#1a2440; border:1px solid rgba(255,255,255,0.08); border-radius:6px; padding:6px 12px; color:#e8edf5; outline:none; cursor:pointer; height:36px;">
      </div>
      <button type="submit" class="btn" style="background:#3b82f6; color:white; border:none; border-radius:6px; padding:8px 16px; font-size:13px; font-weight:600; cursor:pointer; height:36px; transition:opacity 0.2s;"
              onmouseover="this.style.opacity='0.85'" onmouseout="this.style.opacity='1'">🔍 Tra cứu</button>
      <a th:href="@{/doctor/assigned-patients}" class="btn" style="background:rgba(255,255,255,0.05); color:#8a96b0; border:1px solid rgba(255,255,255,0.08); border-radius:6px; padding:8px 16px; font-size:13px; font-weight:600; height:36px; display:inline-flex; align-items:center; text-decoration:none; cursor:pointer;">Xóa lọc</a>
    </form>
    
    <div class="card">
      <table class="patient-table">
        <thead>
          <tr>
            <th>Bệnh nhân</th>
            <th>Ngày sinh</th>
            <th>Giới tính</th>
            <th>Điện thoại</th>
            <th>Địa chỉ</th>
            <th>Nguy cơ AI</th>
            <th></th>
          </tr>
        </thead>
        <tbody>
          <tr th:each="p : ${patients}">
            <td>
              <div class="patient-name-cell">
                <div class="patient-avatar" th:text="${p.fullName != null && !p.fullName.isEmpty() ? p.fullName.charAt(0) : 'U'}">A</div>
                <div>
                  <div class="patient-fullname" th:text="${p.fullName != null ? p.fullName : ''}">Tên</div>
                  <div class="patient-id" th:text="'#BN' + ${p.patientId}">BN001</div>
                </div>
              </div>
            </td>
            <td th:text="${#temporals.format(p.dob, 'dd/MM/yyyy')}" style="color:#8a96b0;font-size:13px;">--</td>
            <td th:text="${p.gender}" style="color:#8a96b0;font-size:13px;">Nam</td>
            <td th:text="${p.phone}" style="color:#8a96b0;font-size:13px;">--</td>
            <td th:text="${p.address}" style="color:#8a96b0;font-size:12px;max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">--</td>
            <td>
              <span th:if="${patientRiskMap != null and patientRiskMap[p.patientId] != null}"
                    class="risk-badge"
                    th:classappend="'risk-' + ${patientRiskMap[p.patientId]}"
                    th:text="${patientRiskMap[p.patientId]}">--</span>
              <span th:if="${patientRiskMap == null or patientRiskMap[p.patientId] == null}"
                    style="color:#4a5568;font-size:12px;">Chưa có</span>
            </td>
            <td>
              <div style="display:flex;gap:6px;">
                <a th:href="@{/doctor/patients/{id}(id=${p.patientId})}" class="action-btn primary" style="background:#10b981; color:white; padding:4px 8px; border-radius:4px; font-size:11px; text-decoration:none; display:inline-flex; align-items:center; gap:4px; font-weight:600;">
                  <i class="ti ti-file-text" style="font-size:12px"></i> Hồ sơ
                </a>
                <a th:href="@{/doctor/ai-predict(patientId=${p.patientId})}" sec:authorize="hasAnyRole('DOCTOR', 'ADMIN')" class="action-btn" style="background:#3b82f6; color:white; padding:4px 8px; border-radius:4px; font-size:11px; text-decoration:none; display:inline-flex; align-items:center; gap:4px; font-weight:600;">
                  <i class="ti ti-brain" style="font-size:12px"></i> AI
                </a>
              </div>
            </td>
          </tr>
          <tr th:if="${#lists.isEmpty(patients)}">
            <td colspan="7" style="text-align:center;color:#8a96b0;padding:30px;">Không tìm thấy bệnh nhân nào</td>
          </tr>
        </tbody>
      </table>
    </div>
    
    <!-- Pagination -->
    <div class="pagination-container" th:if="${totalPages > 0}">
      <div class="pagination-info">
        Hiển thị từ trang <span th:text="${currentPage + 1}">1</span> / <span th:text="${totalPages}">1</span> (Tổng <span th:text="${totalItems}">0</span> bệnh nhân)
      </div>
      <div class="pagination-buttons">
        <!-- Trang đầu -->
        <a th:href="@{/doctor/assigned-patients(page=0, search=${search}, dateStr=${selectedDate})}"
           class="page-btn" th:classappend="${currentPage == 0} ? 'disabled' : ''">
          «
        </a>
        <!-- Trang trước -->
        <a th:href="@{/doctor/assigned-patients(page=${currentPage - 1}, search=${search}, dateStr=${selectedDate})}"
           class="page-btn" th:classappend="${currentPage == 0} ? 'disabled' : ''">
          ‹
        </a>
        <!-- Các số trang -->
        <a th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
           th:if="${totalPages > 0 and i >= currentPage - 2 && i <= currentPage + 2}"
           th:href="@{/doctor/assigned-patients(page=${i}, search=${search}, dateStr=${selectedDate})}"
           class="page-btn"
           th:classappend="${currentPage == i} ? 'active' : ''"
           th:text="${i + 1}">
          1
        </a>
        <!-- Trang sau -->
        <a th:href="@{/doctor/assigned-patients(page=${currentPage + 1}, search=${search}, dateStr=${selectedDate})}"
           class="page-btn" th:classappend="${currentPage == totalPages - 1} ? 'disabled' : ''">
          ›
        </a>
        <!-- Trang cuối -->
        <a th:href="@{/doctor/assigned-patients(page=${totalPages - 1}, search=${search}, dateStr=${selectedDate})}"
           class="page-btn" th:classappend="${currentPage == totalPages - 1} ? 'disabled' : ''">
          »
        </a>
      </div>
    </div>
  </div>
</main>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
