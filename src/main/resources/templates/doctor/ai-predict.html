<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Dự đoán AI')}"></head>
<body>
<div th:replace="~{fragments :: sidebar('ai-predict')}"></div>

<main class="main">
  <header th:replace="~{fragments :: topbar('Dự đoán nguy cơ AI')}"></header>
  <div class="content">

    <div style="display:grid;grid-template-columns:1fr 320px;gap:20px;">

      <!-- Form nhập -->
      <div class="card">
        <div class="card-header">
          <div class="card-title"><i class="ti ti-stethoscope"></i> Chỉ số lâm sàng</div>
        </div>
        <div style="padding:20px;">
          <form th:action="@{/doctor/ai-predict}" method="post" th:object="${aiRequest}">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

            <!-- Chọn bệnh nhân -->
            <div class="form-group full" style="margin-bottom:16px;">
              <label class="form-label">Bệnh nhân *</label>
              <select class="form-input" name="patientId" required>
                <option value="">-- Chọn bệnh nhân --</option>
                <option th:each="p : ${patients}"
                        th:value="${p.patientId}"
                        th:text="${p.fullName + ' (#BN' + p.patientId + ')'}"
                        th:selected="${selectedPatient != null and selectedPatient.patientId == p.patientId}">
                  Bệnh nhân
                </option>
              </select>
            </div>

            <div class="form-grid">
              <div class="form-group">
                <label class="form-label">Tuổi</label>
                <input class="form-input" type="number" th:field="*{age}" placeholder="58" required>
              </div>
              <div class="form-group">
                <label class="form-label">Giới tính</label>
                <select class="form-input" th:field="*{sex}">
                  <option value="Male">Nam</option>
                  <option value="Female">Nữ</option>
                </select>
              </div>
              <div class="form-group">
                <label class="form-label">Loại đau ngực</label>
                <select class="form-input" th:field="*{cp}">
                  <option value="asymptomatic">Không triệu chứng</option>
                  <option value="typical angina">Đau thắt ngực điển hình</option>
                  <option value="atypical angina">Đau thắt ngực không điển hình</option>
                  <option value="non-anginal">Không phải đau thắt ngực</option>
                </select>
              </div>
              <div class="form-group">
                <label class="form-label">Huyết áp lúc nghỉ (mmHg)</label>
                <input class="form-input" type="number" th:field="*{trestbps}" placeholder="130">
              </div>
              <div class="form-group">
                <label class="form-label">Cholesterol (mg/dl)</label>
                <input class="form-input" type="number" th:field="*{chol}" placeholder="200">
              </div>
              <div class="form-group">
                <label class="form-label">Đường huyết > 120?</label>
                <select class="form-input" th:field="*{fbs}">
                  <option value="TRUE">Có</option>
                  <option value="FALSE">Không</option>
                </select>
              </div>
              <div class="form-group">
                <label class="form-label">Kết quả ECG</label>
                <select class="form-input" th:field="*{restecg}">
                  <option value="normal">Bình thường</option>
                  <option value="lv hypertrophy">Phì đại thất trái</option>
                  <option value="st-t abnormality">Bất thường ST-T</option>
                </select>
              </div>
              <div class="form-group">
                <label class="form-label">Nhịp tim tối đa (bpm)</label>
                <input class="form-input" type="number" th:field="*{thalch}" placeholder="150">
              </div>
              <div class="form-group">
                <label class="form-label">Đau ngực khi gắng sức?</label>
                <select class="form-input" th:field="*{exang}">
                  <option value="FALSE">Không</option>
                  <option value="TRUE">Có</option>
                </select>
              </div>
              <div class="form-group">
                <label class="form-label">ST Depression (oldpeak)</label>
                <input class="form-input" type="number" step="0.1" th:field="*{oldpeak}" placeholder="1.0">
              </div>
              <div class="form-group">
                <label class="form-label">Độ dốc ST</label>
                <select class="form-input" th:field="*{slope}">
                  <option value="flat">Phẳng</option>
                  <option value="upsloping">Dốc lên</option>
                  <option value="downsloping">Dốc xuống</option>
                </select>
              </div>
              <div class="form-group">
                <label class="form-label">Số mạch vành tắc (0-3)</label>
                <input class="form-input" type="number" min="0" max="3" th:field="*{ca}" placeholder="0">
              </div>
              <div class="form-group">
                <label class="form-label">Thalassemia</label>
                <select class="form-input" th:field="*{thal}">
                  <option value="normal">Bình thường</option>
                  <option value="fixed defect">Khiếm khuyết cố định</option>
                  <option value="reversable defect">Khiếm khuyết hồi phục</option>
                </select>
              </div>
            </div>

            <!-- Ghi chú và phác đồ -->
            <div class="form-group full" style="margin-top:12px;">
              <label class="form-label">Ghi chú lâm sàng</label>
              <textarea class="form-input" name="notes" rows="2"
                        placeholder="Ghi chú của bác sĩ..." style="resize:vertical;"></textarea>
            </div>
            <div class="form-group full">
              <label class="form-label">Phác đồ điều trị</label>
              <textarea class="form-input" name="treatmentPlan" rows="2"
                        placeholder="Phác đồ điều trị đề xuất..." style="resize:vertical;"></textarea>
            </div>

            <button type="submit" class="btn btn-ai" style="width:100%;justify-content:center;padding:12px;margin-top:8px;">
              <i class="ti ti-brain"></i> Phân tích nguy cơ AI & Lưu hồ sơ
            </button>
          </form>
        </div>
      </div>

      <!-- Kết quả -->
      <div>
        <div class="card" style="margin-bottom:16px;">
          <div class="card-header">
            <div class="card-title"><i class="ti ti-chart-bar"></i> Kết quả AI</div>
          </div>
          <div style="padding:20px;">

            <!-- Có kết quả -->
            <div th:if="${prediction != null}">
              <div style="text-align:center;margin-bottom:16px;">
                <div style="font-size:11px;color:#8a96b0;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;">Mức độ nguy cơ</div>
                <div style="font-size:42px;font-weight:800;line-height:1;"
                     th:text="${prediction.riskLevel}"
                     th:style="${prediction.riskLevel == 'HIGH'} ? 'color:#ff7b7b' : (${prediction.riskLevel == 'MEDIUM'} ? 'color:#fbbf24' : 'color:#34d399')">HIGH</div>
                <div style="font-size:24px;font-weight:600;margin-top:4px;font-family:monospace;"
                     th:text="${prediction.riskScore} + '%'">0%</div>
              </div>
              <div class="prob-bar">
                <div class="prob-fill" th:style="'width:' + ${prediction.riskScore} + '%'"></div>
              </div>
              <div style="font-size:12px;color:#8a96b0;text-align:center;margin-top:12px;padding:10px;background:#0f1628;border-radius:8px;"
                   th:text="${prediction.riskExplanation}">Kết quả phân tích</div>
              <div th:if="${selectedPatient != null}"
                   style="margin-top:10px;font-size:12px;color:#60a5fa;text-align:center;">
                Đã lưu hồ sơ cho: <strong th:text="${selectedPatient.fullName}">Bệnh nhân</strong>
              </div>
            </div>

            <!-- Chưa có kết quả -->
            <div th:if="${prediction == null}" style="text-align:center;padding:30px 0;color:#8a96b0;">
              <i class="ti ti-brain" style="font-size:40px;display:block;margin-bottom:12px;opacity:0.3;"></i>
              <div style="font-size:13px;">Nhập chỉ số và bấm<br>Phân tích nguy cơ AI</div>
            </div>

          </div>
        </div>

        <!-- Thông tin model -->
        <div class="card">
          <div class="card-header">
            <div class="card-title"><i class="ti ti-info-circle"></i> Thông tin model</div>
          </div>
          <div style="padding:16px;display:flex;flex-direction:column;gap:10px;">
            <div style="display:flex;justify-content:space-between;font-size:13px;">
              <span style="color:#8a96b0;">Thuật toán</span>
              <span style="font-family:monospace;font-size:12px;">Random Forest</span>
            </div>
            <div style="display:flex;justify-content:space-between;font-size:13px;">
              <span style="color:#8a96b0;">Dataset</span>
              <span style="font-family:monospace;font-size:12px;">UCI 920 BN</span>
            </div>
            <div style="display:flex;justify-content:space-between;font-size:13px;">
              <span style="color:#8a96b0;">Accuracy</span>
              <span style="color:#34d399;font-weight:600;">84.78%</span>
            </div>
            <div style="display:flex;justify-content:space-between;font-size:13px;">
              <span style="color:#8a96b0;">AUC Score</span>
              <span style="color:#34d399;font-weight:600;">0.9255</span>
            </div>
          </div>
        </div>
      </div>

    </div>
  </div>
</main>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
