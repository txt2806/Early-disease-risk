<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Dự đoán AI')}"></head>
<body>
<div th:replace="~{fragments :: sidebar('ai-predict')}"></div>

<main class="main">
  <header th:replace="~{fragments :: topbar('Dự đoán nguy cơ AI')}"></header>
  <div class="content">

    <div style="display:grid;grid-template-columns:1fr 320px;gap:20px;">

      <!-- Form nhập -->
      <div class="card">
        <div class="card-header">
          <div class="card-title"><i class="ti ti-stethoscope"></i> Chỉ số lâm sàng</div>
        </div>
        <div style="padding:20px;">
          <form th:action="@{/doctor/ai-predict/analyze}" method="post" th:object="${aiRequest}">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

            <!-- Chọn bệnh nhân -->
            <div class="form-group full" style="margin-bottom:16px;">
              <label class="form-label">Bệnh nhân *</label>
              <select class="form-input" name="patientId" required th:disabled="${prediction != null}">
                <option value="">-- Chọn bệnh nhân --</option>
                <option th:each="p : ${patients}"
                        th:value="${p.patientId}"
                        th:text="${p.fullName + ' (#BN' + p.patientId + ')'}"
                        th:selected="${selectedPatient != null and selectedPatient.patientId == p.patientId}">
                  Bệnh nhân
                </option>
              </select>
            </div>

            <div class="form-grid">
              <div class="form-group">
                <label class="form-label">Tuổi</label>
                <input class="form-input" type="number" th:field="*{age}" placeholder="58" required th:disabled="${prediction != null}">
              </div>
              <div class="form-group">
                <label class="form-label">Giới tính</label>
                <select class="form-input" th:field="*{sex}" th:disabled="${prediction != null}">
                  <option value="Male">Nam</option>
                  <option value="Female">Nữ</option>
                </select>
              </div>
              <div class="form-group">
                <label class="form-label">Loại đau ngực</label>
                <select class="form-input" th:field="*{cp}" th:disabled="${prediction != null}">
                  <option value="asymptomatic">Không triệu chứng</option>
                  <option value="typical angina">Đau thắt ngực điển hình</option>
                  <option value="atypical angina">Đau thắt ngực không điển hình</option>
                  <option value="non-anginal">Không phải đau thắt ngực</option>
                </select>
              </div>
              <div class="form-group">
                <label class="form-label">Huyết áp lúc nghỉ (mmHg)</label>
                <input class="form-input" type="number" th:field="*{trestbps}" placeholder="130" th:disabled="${prediction != null}">
              </div>
              <div class="form-group">
                <label class="form-label">Cholesterol (mg/dl)</label>
                <input class="form-input" type="number" th:field="*{chol}" placeholder="200" th:disabled="${prediction != null}">
              </div>
              <div class="form-group">
                <label class="form-label">Đường huyết > 120?</label>
                <select class="form-input" th:field="*{fbs}" th:disabled="${prediction != null}">
                  <option value="TRUE">Có</option>
                  <option value="FALSE">Không</option>
                </select>
              </div>
              <div class="form-group">
                <label class="form-label">Kết quả ECG</label>
                <select class="form-input" th:field="*{restecg}" th:disabled="${prediction != null}">
                  <option value="normal">Bình thường</option>
                  <option value="lv hypertrophy">Phì đại thất trái</option>
                  <option value="st-t abnormality">Bất thường ST-T</option>
                </select>
              </div>
              <div class="form-group">
                <label class="form-label">Nhịp tim tối đa (bpm)</label>
                <input class="form-input" type="number" th:field="*{thalch}" placeholder="150" th:disabled="${prediction != null}">
              </div>
              <div class="form-group">
                <label class="form-label">Đau ngực khi gắng sức?</label>
                <select class="form-input" th:field="*{exang}" th:disabled="${prediction != null}">
                  <option value="FALSE">Không</option>
                  <option value="TRUE">Có</option>
                </select>
              </div>
              <div class="form-group">
                <label class="form-label">ST Depression (oldpeak)</label>
                <input class="form-input" type="number" step="0.1" th:field="*{oldpeak}" placeholder="1.0" th:disabled="${prediction != null}">
              </div>
              <div class="form-group">
                <label class="form-label">Độ dốc ST</label>
                <select class="form-input" th:field="*{slope}" th:disabled="${prediction != null}">
                  <option value="flat">Phẳng</option>
                  <option value="upsloping">Dốc lên</option>
                  <option value="downsloping">Dốc xuống</option>
                </select>
              </div>
              <div class="form-group">
                <label class="form-label">Số mạch vành tắc (0-3)</label>
                <input class="form-input" type="number" min="0" max="3" th:field="*{ca}" placeholder="0" th:disabled="${prediction != null}">
              </div>
              <div class="form-group">
                <label class="form-label">Thalassemia</label>
                <select class="form-input" th:field="*{thal}" th:disabled="${prediction != null}">
                  <option value="normal">Bình thường</option>
                  <option value="fixed defect">Khiếm khuyết cố định</option>
                  <option value="reversable defect">Khiếm khuyết hồi phục</option>
                </select>
              </div>
            </div>

            <button th:if="${prediction == null}" type="submit" class="btn btn-ai" style="width:100%;justify-content:center;padding:12px;margin-top:20px;">
              <i class="ti ti-brain"></i> Phân tích nguy cơ AI
            </button>
          </form>
        </div>
      </div>

      <!-- Kết quả -->
      <div>
        <div class="card" style="margin-bottom:16px;">
          <div class="card-header">
            <div class="card-title"><i class="ti ti-chart-bar"></i> Kết quả AI</div>
          </div>
          <div style="padding:20px;">

            <!-- Có kết quả -->
            <div th:if="${prediction != null}">
              <div style="text-align:center;margin-bottom:16px;">
                <div style="font-size:11px;color:#8a96b0;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;">Mức độ nguy cơ</div>
                <div style="font-size:42px;font-weight:800;line-height:1;"
                     th:text="${prediction.riskLevel}"
                     th:style="${prediction.riskLevel == 'HIGH'} ? 'color:#ff7b7b' : (${prediction.riskLevel == 'MEDIUM'} ? 'color:#fbbf24' : 'color:#34d399')">HIGH</div>
                <div style="font-size:24px;font-weight:600;margin-top:4px;font-family:monospace;"
                     th:text="${#numbers.formatDecimal(prediction.riskScore, 1, 1)} + '%'">0%</div>
              </div>
              <div class="prob-bar">
                <div class="prob-fill" th:style="'width:' + ${prediction.riskScore} + '%'"></div>
              </div>
              <div style="font-size:12px;color:#8a96b0;text-align:center;margin-top:12px;padding:10px;background:#0f1628;border-radius:8px;"
                   th:text="${prediction.riskExplanation}">Kết quả phân tích</div>

              <!-- Nếu đã lưu thành công -->
              <div th:if="${isSaved}" style="margin-top:20px;padding:12px;background:rgba(52,211,153,0.15);border:1px solid rgba(52,211,153,0.3);border-radius:8px;text-align:center;">
                <span style="font-size:20px;display:block;margin-bottom:4px;">✅</span>
                <span style="font-size:13px;color:#34d399;font-weight:600;">Lưu hồ sơ thành công!</span>
                <div style="font-size:12px;color:#e8edf5;margin-top:4px;">
                  Đã lưu cho bệnh nhân: <strong th:text="${selectedPatient.fullName}">Bệnh nhân</strong>
                </div>
                <a th:href="@{/doctor/ai-predict}" class="btn" style="display:inline-flex;margin-top:10px;padding:6px 12px;font-size:12px;background:#3b82f6;color:white;border-radius:6px;text-decoration:none;">Nhập ca mới</a>
              </div>

              <!-- Nếu chưa lưu: hiển thị Form nhập ghi chú chẩn đoán để Lưu -->
              <div th:if="${!isSaved}" style="margin-top:20px;border-top:1px solid rgba(255,255,255,0.08);padding-top:20px;">
                <form th:action="@{/doctor/ai-predict/save}" method="post">
                  <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                  
                  <!-- Các trường ẩn để gửi ngược lại chỉ số lâm sàng -->
                  <input type="hidden" name="patientId" th:value="${selectedPatient.patientId}">
                  <input type="hidden" name="age" th:value="${aiRequest.age}">
                  <input type="hidden" name="sex" th:value="${aiRequest.sex}">
                  <input type="hidden" name="cp" th:value="${aiRequest.cp}">
                  <input type="hidden" name="trestbps" th:value="${aiRequest.trestbps}">
                  <input type="hidden" name="chol" th:value="${aiRequest.chol}">
                  <input type="hidden" name="fbs" th:value="${aiRequest.fbs}">
                  <input type="hidden" name="restecg" th:value="${aiRequest.restecg}">
                  <input type="hidden" name="thalch" th:value="${aiRequest.thalch}">
                  <input type="hidden" name="exang" th:value="${aiRequest.exang}">
                  <input type="hidden" name="oldpeak" th:value="${aiRequest.oldpeak}">
                  <input type="hidden" name="slope" th:value="${aiRequest.slope}">
                  <input type="hidden" name="ca" th:value="${aiRequest.ca}">
                  <input type="hidden" name="thal" th:value="${aiRequest.thal}">
                  
                  <!-- Các trường ẩn chứa kết quả AI -->
                  <input type="hidden" name="riskScore" th:value="${prediction.riskScore}">
                  <input type="hidden" name="riskLevel" th:value="${prediction.riskLevel}">
                  <input type="hidden" name="riskExplanation" th:value="${prediction.riskExplanation}">

                  <!-- Nhập ghi chú chẩn đoán bác sĩ -->
                  <div class="form-group full">
                    <label class="form-label" style="font-weight:700;color:#60a5fa;">Ghi chú chẩn đoán bác sĩ *</label>
                    <textarea class="form-input" name="doctorNotes" rows="3" required
                              placeholder="Nhập chẩn đoán lâm sàng..." style="resize:vertical;background:#1e293b;border-color:rgba(255,255,255,0.1);"></textarea>
                  </div>

                  <!-- Nhập phác đồ điều trị -->
                  <div class="form-group full" style="margin-top:12px;">
                    <label class="form-label" style="font-weight:700;color:#60a5fa;">Phác đồ điều trị</label>
                    <textarea class="form-input" name="treatmentPlan" rows="3"
                              placeholder="Nhập hướng dẫn điều trị, thuốc và phác đồ..." style="resize:vertical;background:#1e293b;border-color:rgba(255,255,255,0.1);"></textarea>
                  </div>

                  <div style="display:flex;gap:8px;margin-top:12px;">
                    <a th:href="@{/doctor/ai-predict}" class="btn" style="flex:1;justify-content:center;background:rgba(255,255,255,0.08);color:#e8edf5;border:1px solid rgba(255,255,255,0.1);text-decoration:none;display:inline-flex;align-items:center;border-radius:8px;font-size:13px;font-weight:600;">Hủy bỏ</a>
                    <button type="submit" class="btn btn-ai" style="flex:2;justify-content:center;padding:10px;">
                      <i class="ti ti-device-floppy"></i> Lưu vào hồ sơ
                    </button>
                  </div>
                </form>
              </div>
            </div>

            <!-- Chưa có kết quả -->
            <div th:if="${prediction == null}" style="text-align:center;padding:30px 0;color:#8a96b0;">
              <i class="ti ti-brain" style="font-size:40px;display:block;margin-bottom:12px;opacity:0.3;"></i>
              <div style="font-size:13px;">Nhập chỉ số và bấm<br>Phân tích nguy cơ AI</div>
            </div>

          </div>
        </div>

        <!-- Thông tin model -->
        <div class="card">
          <div class="card-header">
            <div class="card-title"><i class="ti ti-info-circle"></i> Thông tin model</div>
          </div>
          <div style="padding:16px;display:flex;flex-direction:column;gap:10px;">
            <div style="display:flex;justify-content:space-between;font-size:13px;">
              <span style="color:#8a96b0;">Thuật toán</span>
              <span style="font-family:monospace;font-size:12px;">Random Forest</span>
            </div>
            <div style="display:flex;justify-content:space-between;font-size:13px;">
              <span style="color:#8a96b0;">Dataset</span>
              <span style="font-family:monospace;font-size:12px;">UCI 920 BN</span>
            </div>
            <div style="display:flex;justify-content:space-between;font-size:13px;">
              <span style="color:#8a96b0;">Accuracy</span>
              <span style="color:#34d399;font-weight:600;">84.78%</span>
            </div>
            <div style="display:flex;justify-content:space-between;font-size:13px;">
              <span style="color:#8a96b0;">AUC Score</span>
              <span style="color:#34d399;font-weight:600;">0.9255</span>
            </div>
          </div>
        </div>
      </div>

    </div>
  </div>
</main>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
