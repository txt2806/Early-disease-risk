<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Thêm bệnh nhân')}"></head>
<body>
<div th:replace="~{fragments :: sidebar('patients')}"></div>

<main class="main">
  <header th:replace="~{fragments :: topbar('Thêm bệnh nhân mới')}"></header>
  <div class="content">

    <div style="max-width:680px;">
      <div class="card">
        <div class="card-header">
          <div class="card-title"><i class="ti ti-user-plus"></i> Thông tin bệnh nhân</div>
        </div>
        <div style="padding:24px;">
          <form th:action="@{/doctor/patients/save}" method="post" th:object="${patient}">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

            <div class="form-section">
              <div class="form-section-title"><i class="ti ti-user"></i> Thông tin cá nhân</div>
              <div class="form-grid">
                <div class="form-group">
                  <label class="form-label">Họ và tên *</label>
                  <input class="form-input" type="text" th:field="*{fullName}" placeholder="Nguyễn Văn A" required>
                </div>
                <div class="form-group">
                  <label class="form-label">Tên đăng nhập *</label>
                  <input class="form-input" type="text" th:field="*{username}" placeholder="nguyenvana" required>
                </div>
                <div class="form-group">
                  <label class="form-label">Ngày sinh *</label>
                  <input class="form-input" type="date" th:field="*{dob}" required>
                </div>
                <div class="form-group">
                  <label class="form-label">Giới tính *</label>
                  <select class="form-input" th:field="*{gender}" required>
                    <option value="Nam">Nam</option>
                    <option value="Nữ">Nữ</option>
                  </select>
                </div>
                <div class="form-group">
                  <label class="form-label">Số điện thoại</label>
                  <input class="form-input" type="text" th:field="*{phone}" placeholder="0901234567">
                </div>
                <div class="form-group">
                  <label class="form-label">Địa chỉ</label>
                  <input class="form-input" type="text" th:field="*{address}" placeholder="Hà Nội">
                </div>
              </div>
            </div>

            <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:16px;">
              <a th:href="@{/doctor/patients}" class="btn btn-ghost">Hủy</a>
              <button type="submit" class="btn btn-primary">
                <i class="ti ti-check"></i> Lưu bệnh nhân
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>

  </div>
</main>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
