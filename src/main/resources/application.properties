# ── SERVER ──────────────────────────────────────────
server.port=8080

# ── SUPABASE (POSTGRESQL) ─────────────────────────
# Database Supabase - đã kết nối sẵn, không cần đổi
spring.datasource.url=jdbc:sqlserver://localhost\\MSSQLSERVER05;databaseName=Cardiology_Management_DB;encrypt=true;trustServerCertificate=true
spring.datasource.username=sa
spring.datasource.password=123456
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# ── JPA ──────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.show-sql=false
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.hibernate.naming.implicit-strategy=org.hibernate.boot.model.naming.ImplicitNamingStrategyLegacyHbmImpl

# ── THYMELEAF ────────────────────────────────────────
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8

# ── AI API ───────────────────────────────────────────
# Đổi IP thành IP máy đang chạy FastAPI
ai.api.url=http://192.168.0.100:8000/predict

# ── SESSION ──────────────────────────────────────────
server.servlet.session.timeout=30m

# ── CONNECTION POOL ──────────────────────────────────
spring.datasource.hikari.connection-timeout=10000
spring.datasource.hikari.initialization-fail-timeout=-1
spring.datasource.hikari.maximum-pool-size=5

# ── ENCODING ─────────────────────────────────────────
spring.mandatory-file-encoding=UTF-8
