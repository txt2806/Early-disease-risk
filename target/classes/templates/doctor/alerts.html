<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Cảnh báo')}"></head>
<body>
<div th:replace="~{fragments :: sidebar('alerts')}"></div>

<main class="main">
  <header th:replace="~{fragments :: topbar('Cảnh báo sớm')}"></header>
  <div class="content">

    <!-- Summary badges -->
    <div style="display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap;">
      <div class="risk-badge risk-HIGH" style="padding:8px 16px;font-size:13px;">
        🔴 HIGH: <span th:text="${highCount}">0</span>
      </div>
      <div class="risk-badge risk-MEDIUM" style="padding:8px 16px;font-size:13px;">
        🟡 MEDIUM: <span th:text="${medCount}">0</span>
      </div>
      <div class="risk-badge risk-LOW" style="padding:8px 16px;font-size:13px;">
        🟢 LOW: <span th:text="${lowCount}">0</span>
      </div>
    </div>

    <!-- Alert list -->
    <div th:each="a : ${alerts}"
         class="alert-full-item"
         th:classappend="${a.riskLevel}">
      <div class="alert-severity"
           th:classappend="'sev-' + ${a.riskLevel}"
           style="width:42px;height:42px;font-size:20px;border-radius:10px;display:flex;align-items:center;justify-content:center;"
           th:text="${a.riskLevel == 'HIGH'} ? '🔴' : (${a.riskLevel == 'MEDIUM'} ? '🟡' : '🟢')">🔴</div>

      <div class="alert-full-body">
        <div class="alert-full-name">
          <span th:text="${a.record.patient.fullName}">Bệnh nhân</span>
          <span style="color:#8a96b0;font-size:12px;font-weight:400;"
                th:text="' (#BN' + ${a.record.patient.patientId} + ')'"> (#BN001)</span>
        </div>
        <div class="alert-full-desc" th:text="${a.riskExplanation}">Mô tả cảnh báo</div>
        <div class="alert-full-meta"
             th:text="${#temporals.format(a.record.visitDate, 'dd/MM/yyyy HH:mm')}">Thời gian</div>
      </div>

      <div>
        <div class="risk-badge" th:classappend="'risk-' + ${a.riskLevel}"
             th:text="${a.riskLevel + ' · ' + a.riskScore + '%'}">HIGH</div>
        <div style="font-size:11px;color:#8a96b0;margin-top:4px;text-align:center;"
             th:text="${a.isAlertSent ? 'Đã xử lý' : 'Chưa xử lý'}">Chưa xử lý</div>
      </div>
    </div>

    <div th:if="${#lists.isEmpty(alerts)}"
         style="text-align:center;padding:60px;color:#8a96b0;">
      <i class="ti ti-bell-off" style="font-size:48px;display:block;margin-bottom:12px;opacity:0.3;"></i>
      Không có cảnh báo nào
    </div>

  </div>
</main>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
