<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Dashboard')}"></head>
<body>
<div th:replace="~{fragments :: sidebar('dashboard')}"></div>

<main class="main">
  <header th:replace="~{fragments :: topbar('Dashboard')}"></header>
  <div class="content">

    <!-- Flash message -->
    <div class="alert-success" th:if="${success}" th:text="${success}"></div>

    <!-- Stats -->
    <div class="stats-grid">
      <div class="stat-card red">
        <div class="stat-icon"><i class="ti ti-users"></i></div>
        <div class="stat-value" th:text="${totalPatients}">0</div>
        <div class="stat-label">Bệnh nhân phụ trách</div>
      </div>
      <div class="stat-card blue">
        <div class="stat-icon"><i class="ti ti-alert-triangle"></i></div>
        <div class="stat-value" th:text="${highAlertCount}">0</div>
        <div class="stat-label">Cảnh báo HIGH</div>
      </div>
      <div class="stat-card green">
        <div class="stat-icon"><i class="ti ti-bell"></i></div>
        <div class="stat-value" th:text="${totalAlerts}">0</div>
        <div class="stat-label">Tổng cảnh báo</div>
      </div>
      <div class="stat-card yellow">
        <div class="stat-icon"><i class="ti ti-brain"></i></div>
        <div class="stat-value">92%</div>
        <div class="stat-label">Độ chính xác AI</div>
      </div>
    </div>

    <div class="two-col">
      <!-- Bệnh nhân gần đây -->
      <div class="card">
        <div class="card-header">
          <div class="card-title"><i class="ti ti-users"></i> Bệnh nhân gần đây</div>
          <a th:href="@{/doctor/patients}" class="card-action">Xem tất cả →</a>
        </div>
        <table class="patient-table">
          <thead>
            <tr>
              <th>Bệnh nhân</th>
              <th>Tuổi</th>
              <th>Giới tính</th>
              <th></th>
            </tr>
          </thead>
          <tbody>
            <tr th:each="p : ${patients}" th:if="${pStat.index < 5}">
              <td>
                <div class="patient-name-cell">
                  <div class="patient-avatar" th:text="${p.fullName.charAt(0)}">A</div>
                  <div>
                    <div class="patient-fullname" th:text="${p.fullName}">Tên</div>
                    <div class="patient-id" th:text="'BN' + p.patientId">BN001</div>
                  </div>
                </div>
              </td>
              <td th:text="${#temporals.format(p.dob, 'dd/MM/yyyy')}">01/01/1990</td>
              <td th:text="${p.gender}">Nam</td>
              <td>
                <a th:href="@{/doctor/patients/{id}(id=${p.patientId})}" class="action-btn primary">
                  Xem
                </a>
              </td>
            </tr>
            <tr th:if="${#lists.isEmpty(patients)}">
              <td colspan="4" style="text-align:center;color:#8a96b0;padding:20px;">
                Chưa có bệnh nhân nào
              </td>
            </tr>
          </tbody>
        </table>
      </div>

      <!-- Cảnh báo gần đây -->
      <div class="card">
        <div class="card-header">
          <div class="card-title"><i class="ti ti-bell-ringing"></i> Cảnh báo mới</div>
          <a th:href="@{/doctor/alerts}" class="card-action">Xem tất cả</a>
        </div>
        <div class="alert-list">
          <div class="alert-item" th:each="a : ${alerts}">
            <div class="alert-severity"
                 th:classappend="${a.riskLevel == 'HIGH'} ? ' sev-HIGH' : (${a.riskLevel == 'MEDIUM'} ? ' sev-MEDIUM' : ' sev-LOW')"
                 th:text="${a.riskLevel == 'HIGH'} ? '🔴' : (${a.riskLevel == 'MEDIUM'} ? '🟡' : '🟢')">🔴</div>
            <div class="alert-body">
              <div class="alert-patient" th:text="${a.record.patient.fullName}">Bệnh nhân</div>
              <div class="alert-desc" th:text="${a.riskExplanation}">Mô tả</div>
              <div class="alert-time"
                   th:text="${#temporals.format(a.record.visitDate, 'dd/MM/yyyy HH:mm')}">Thời gian</div>
            </div>
          </div>
          <div th:if="${#lists.isEmpty(alerts)}"
               style="text-align:center;padding:20px;color:#8a96b0;font-size:13px;">
            Không có cảnh báo mới
          </div>
        </div>
      </div>
    </div>

  </div>
</main>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
