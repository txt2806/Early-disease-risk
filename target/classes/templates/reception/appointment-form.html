<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Tiếp đón & Tạo lịch hẹn')}"></head>
<body>
<div th:replace="~{fragments :: receptionSidebar('book-appointment')}"></div>

<main class="main">
  <header th:replace="~{fragments :: simpleTopbar('Tiếp đón & Tạo lịch hẹn')}"></header>
  <div class="content">

    <div class="alert-success" th:if="${success}" th:text="${success}" style="padding: 12px; margin-bottom: 20px; border-radius: 8px; background: rgba(16, 185, 129, 0.15); color: #34d399; border: 1px solid rgba(16, 185, 129, 0.3);"></div>
    <div class="alert-danger" th:if="${error}" th:text="${error}" style="padding: 12px; margin-bottom: 20px; border-radius: 8px; background: rgba(239, 68, 68, 0.15); color: #f87171; border: 1px solid rgba(239, 68, 68, 0.3);"></div>

    <div class="card" style="max-width: 650px; margin: 0 auto;">
      <div class="card-header">
        <div class="card-title">📝 Tạo Lịch khám & Phân phòng trực tiếp</div>
      </div>
      <form th:action="@{/reception/appointments/new/save}" method="post" style="padding-top:10px;">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

        <!-- Loại bệnh nhân (Tab switcher) -->
        <input type="hidden" name="patientType" id="patientType" value="existing">
        <div style="display: flex; gap: 8px; margin-bottom: 20px; border-bottom: 1px solid rgba(255,255,255,0.08); padding-bottom: 12px;">
          <button type="button" id="tabExisting" onclick="switchPatientType('existing')" 
                  style="flex: 1; padding: 10px; border-radius: 8px; border: none; background: #3b82f6; color: white; font-weight: 600; cursor: pointer; transition: all 0.2s; font-size: 13px;">
            🔍 Bệnh nhân đã có tài khoản
          </button>
          <button type="button" id="tabNew" onclick="switchPatientType('new')" 
                  style="flex: 1; padding: 10px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.08); background: #1a2440; color: #8a96b0; font-weight: 600; cursor: pointer; transition: all 0.2s; font-size: 13px;">
            ✨ Đăng ký bệnh nhân mới
          </button>
        </div>

        <!-- TH 1: Chọn bệnh nhân đã có sẵn (Autocomplete Search) -->
        <div id="existingPatientSection" class="form-group" style="margin-bottom: 20px; position: relative;">
          <label style="color:#8a96b0; font-size:12px; font-weight:600; margin-bottom:6px; display:block;">Tìm kiếm Bệnh nhân</label>
          <div style="position: relative;">
            <input type="text" id="patientSearchInput" placeholder="Nhập tên hoặc số điện thoại bệnh nhân để tìm kiếm..." 
                   autocomplete="off"
                   style="width: 100%; background: #1a2440; border: 1px solid rgba(255,255,255,0.08); border-radius: 8px; padding: 12px; color: #e8edf5; font-size: 14px; outline: none; transition: border-color 0.2s;">
            <i class="ti ti-search" style="position: absolute; right: 12px; top: 50%; transform: translateY(-50%); color: #8a96b0; font-size: 18px; pointer-events: none;"></i>
          </div>
          <input type="hidden" name="patientId" id="patientId" required>
          
          <!-- Dropdown danh sách gợi ý -->
          <div id="patientDropdownMenu" style="position: absolute; width: 100%; max-height: 250px; overflow-y: auto; background: #111827; border: 1px solid rgba(255,255,255,0.15); border-radius: 8px; z-index: 1000; margin-top: 4px; display: none; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5);">
            <div class="patient-opt" th:each="p : ${patients}" 
                 th:data-id="${p.patientId}" 
                 th:data-name="${p.fullName}" 
                 th:data-phone="${p.phone}"
                 th:data-info="${p.fullName + ' - SĐT: ' + (p.phone != null ? p.phone : 'Không có')}"
                 th:data-search="${p.fullName.toLowerCase() + ' ' + (p.phone != null ? p.phone.toLowerCase() : '')}"
                 style="padding: 12px; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.05); transition: background 0.2s;">
              <div style="font-weight: 600; color: #e8edf5; font-size: 14px;" th:text="${p.fullName}"></div>
              <div style="font-size: 12px; color: #8a96b0; margin-top: 4px;" th:text="${'SĐT: ' + (p.phone != null ? p.phone : 'Không có') + ' (Sinh ngày: ' + #temporals.format(p.dob, 'dd/MM/yyyy') + ')'}"></div>
            </div>
            <div id="noPatientFound" style="padding: 14px; text-align: center; color: #8a96b0; font-size: 13px; display: none;">
              ⚠️ Không tìm thấy bệnh nhân trùng khớp
            </div>
          </div>
        </div>

        <!-- TH 2: Đăng ký bệnh nhân mới (Ẩn mặc định) -->
        <div id="newPatientSection" style="display: none; background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05); border-radius: 12px; padding: 16px; margin-bottom: 20px;">
          <h4 style="font-size: 13px; font-weight: 600; color: #3b82f6; margin-bottom: 14px; text-transform: uppercase; letter-spacing: 0.5px;">📋 Thông tin bệnh nhân mới</h4>
          
          <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px;">
            <div class="form-group">
              <label style="color:#8a96b0; font-size:11px; font-weight:600; margin-bottom:4px;">Họ và tên</label>
              <input type="text" name="newFullName" id="newFullName" placeholder="Nguyễn Văn A" 
                     style="width: 100%; background: #1a2440; border: 1px solid rgba(255,255,255,0.08); border-radius: 8px; padding: 10px; color: #e8edf5; font-size: 13px; outline: none;">
            </div>
            <div class="form-group">
              <label style="color:#8a96b0; font-size:11px; font-weight:600; margin-bottom:4px;">Số điện thoại</label>
              <input type="text" name="newPhone" id="newPhone" placeholder="Ví dụ: 0987654321" 
                     style="width: 100%; background: #1a2440; border: 1px solid rgba(255,255,255,0.08); border-radius: 8px; padding: 10px; color: #e8edf5; font-size: 13px; outline: none;">
            </div>
          </div>

          <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px;">
            <div class="form-group">
              <label style="color:#8a96b0; font-size:11px; font-weight:600; margin-bottom:4px;">Ngày sinh</label>
              <input type="date" name="newDob" id="newDob" 
                     style="width: 100%; background: #1a2440; border: 1px solid rgba(255,255,255,0.08); border-radius: 8px; padding: 10px; color: #e8edf5; font-size: 13px; outline: none;">
            </div>
            <div class="form-group">
              <label style="color:#8a96b0; font-size:11px; font-weight:600; margin-bottom:4px;">Giới tính</label>
              <select name="newGender" id="newGender" 
                      style="width: 100%; background: #1a2440; border: 1px solid rgba(255,255,255,0.08); border-radius: 8px; padding: 10px; color: #e8edf5; font-size: 13px; outline: none; cursor:pointer;">
                <option value="Nam">Nam</option>
                <option value="Nữ">Nữ</option>
                <option value="Khác">Khác</option>
              </select>
            </div>
          </div>

          <div class="form-group">
            <label style="color:#8a96b0; font-size:11px; font-weight:600; margin-bottom:4px;">Địa chỉ</label>
            <input type="text" name="newAddress" id="newAddress" placeholder="Ví dụ: Quận 1, TP. Hồ Chí Minh" 
                   style="width: 100%; background: #1a2440; border: 1px solid rgba(255,255,255,0.08); border-radius: 8px; padding: 10px; color: #e8edf5; font-size: 13px; outline: none;">
          </div>
          <div style="font-size: 11px; color: #a1a1aa; margin-top: 8px;">
            💡 Hệ thống sẽ tự động cấp tài khoản với <b>Tên đăng nhập là số điện thoại</b> và <b>Mật khẩu mặc định là 123</b>.
          </div>
        </div>

        <!-- Chọn bác sĩ -->
        <div class="form-group" style="margin-bottom: 16px;">
          <label style="color:#8a96b0; font-size:12px; font-weight:600; margin-bottom:6px; display:block;">Bác sĩ phụ trách</label>
          <select name="doctorId" id="doctorIdSelect" required 
                  style="width: 100%; background: #1a2440; border: 1px solid rgba(255,255,255,0.08); border-radius: 8px; padding: 12px; color: #e8edf5; font-size: 14px; outline: none; cursor:pointer;">
            <option value="" disabled selected>-- Chọn Bác sĩ Tim mạch --</option>
            <option th:each="doc : ${doctors}" th:value="${doc.doctorId}" th:data-room="${doc.roomNumber}" th:text="${doc.fullName + ' - Chuyên khoa: ' + doc.specialty}"></option>
          </select>
        </div>

        <!-- Xếp phòng khám -->
        <div class="form-group" style="margin-bottom: 16px;">
          <label style="color:#8a96b0; font-size:12px; font-weight:600; margin-bottom:6px; display:block;">Xếp phòng khám (Tự động hiển thị theo Bác sĩ)</label>
          <input type="text" name="roomNumber" id="roomNumberInput" placeholder="Ví dụ: Phòng 101, Phòng 102..." 
                 style="width: 100%; background: #1a2440; border: 1px solid rgba(255,255,255,0.08); border-radius: 8px; padding: 12px; color: #e8edf5; font-size: 14px; outline: none;">
        </div>

        <div style="margin-bottom:16px;">
          <!-- Chọn ngày -->
          <div class="form-group">
            <label style="color:#8a96b0; font-size:12px; font-weight:600; margin-bottom:6px; display:block;">Ngày khám</label>
            <input type="date" name="scheduledDate" id="scheduledDate" required 
                   style="width: 100%; background: #1a2440; border: 1px solid rgba(255,255,255,0.08); border-radius: 8px; padding: 12px; color: #e8edf5; font-size: 14px; outline: none;">
          </div>
        </div>

        <!-- Tình trạng sơ bộ -->
        <div class="form-group" style="margin-bottom: 16px;">
          <label style="color:#8a96b0; font-size:12px; font-weight:600; margin-bottom:6px; display:block;">Tình trạng sơ bộ (Bệnh nhân tự khai báo hoặc lễ tân ghi nhận)</label>
          <textarea name="preliminaryStatus" rows="3" placeholder="Ví dụ: Đau tức ngực kèm theo vã mồ hôi, nhịp tim đo tại chỗ 105 bpm..." required 
                    style="width: 100%; background: #1a2440; border: 1px solid rgba(255,255,255,0.08); border-radius: 8px; padding: 12px; color: #e8edf5; font-size: 14px; outline: none; font-family:inherit; resize:vertical;"></textarea>
        </div>

        <!-- Trạng thái khám -->
        <div class="form-group" style="margin-bottom: 24px;">
          <label style="color:#8a96b0; font-size:12px; font-weight:600; margin-bottom:6px; display:block;">Trạng thái khám ban đầu</label>
          <select name="status" required 
                  style="width: 100%; background: #1a2440; border: 1px solid rgba(255,255,255,0.08); border-radius: 8px; padding: 12px; color: #e8edf5; font-size: 14px; outline: none; cursor:pointer;">
            <option value="CheckedIn" selected>Bệnh nhân đã đến phòng khám (CheckedIn)</option>
            <option value="Confirmed">Lịch hẹn đã xác nhận (Confirmed)</option>
            <option value="Pending">Chờ duyệt (Pending)</option>
          </select>
        </div>

        <button type="submit" class="btn" style="width:100%; background: linear-gradient(135deg, #3b82f6, #1d4ed8); color:white; border:none; padding:12px; border-radius:8px; font-weight:600; cursor:pointer; font-size:14px; transition: opacity 0.2s;">Xác nhận Đăng ký & Phân phòng</button>
      </form>
    </div>

  </div>
</main>
<script>
// Default date to today
const dateInput = document.getElementById('scheduledDate');
if (dateInput) {
  const today = new Date().toISOString().split('T')[0];
  dateInput.value = today;
}

// Function to switch patient type tabs
function switchPatientType(type) {
  const patientTypeInput = document.getElementById('patientType');
  const existingSection = document.getElementById('existingPatientSection');
  const newSection = document.getElementById('newPatientSection');
  const tabExisting = document.getElementById('tabExisting');
  const tabNew = document.getElementById('tabNew');

  const patientIdInput = document.getElementById('patientId');
  const newFullName = document.getElementById('newFullName');
  const newPhone = document.getElementById('newPhone');
  const newDob = document.getElementById('newDob');
  const newGender = document.getElementById('newGender');
  const newAddress = document.getElementById('newAddress');

  patientTypeInput.value = type;

  if (type === 'existing') {
    existingSection.style.display = 'block';
    newSection.style.display = 'none';

    // Style tabs
    tabExisting.style.background = '#3b82f6';
    tabExisting.style.color = 'white';
    tabExisting.style.border = 'none';

    tabNew.style.background = '#1a2440';
    tabNew.style.color = '#8a96b0';
    tabNew.style.border = '1px solid rgba(255,255,255,0.08)';

    // Set requirements
    patientIdInput.setAttribute('required', 'required');
    newFullName.removeAttribute('required');
    newPhone.removeAttribute('required');
    newDob.removeAttribute('required');
    newGender.removeAttribute('required');
    newAddress.removeAttribute('required');
  } else {
    existingSection.style.display = 'none';
    newSection.style.display = 'block';

    // Style tabs
    tabNew.style.background = '#3b82f6';
    tabNew.style.color = 'white';
    tabNew.style.border = 'none';

    tabExisting.style.background = '#1a2440';
    tabExisting.style.color = '#8a96b0';
    tabExisting.style.border = '1px solid rgba(255,255,255,0.08)';

    // Set requirements
    patientIdInput.removeAttribute('required');
    newFullName.setAttribute('required', 'required');
    newPhone.setAttribute('required', 'required');
    newDob.setAttribute('required', 'required');
    newGender.setAttribute('required', 'required');
    newAddress.setAttribute('required', 'required');
  }
}

// Autocomplete and filtering logic
document.addEventListener('DOMContentLoaded', function() {
  const searchInput = document.getElementById('patientSearchInput');
  const dropdownMenu = document.getElementById('patientDropdownMenu');
  const patientOpts = document.querySelectorAll('.patient-opt');
  const noPatientFound = document.getElementById('noPatientFound');
  const patientIdInput = document.getElementById('patientId');
  
  // Doctor/Room auto-completion
  const doctorIdSelect = document.getElementById('doctorIdSelect');
  const roomNumberInput = document.getElementById('roomNumberInput');
  if (doctorIdSelect && roomNumberInput) {
    doctorIdSelect.addEventListener('change', function() {
      const selectedOption = this.options[this.selectedIndex];
      const room = selectedOption.getAttribute('data-room') || '';
      roomNumberInput.value = room;
    });
  }

  // Set initial default state
  switchPatientType('existing');

  if (searchInput && dropdownMenu) {
    // Show dropdown on focus
    searchInput.addEventListener('focus', function() {
      dropdownMenu.style.display = 'block';
      filterPatients();
    });

    // Filter on keyup
    searchInput.addEventListener('input', filterPatients);

    function filterPatients() {
      const val = searchInput.value.toLowerCase().trim();
      let hasMatch = false;

      patientOpts.forEach(opt => {
        const searchData = opt.getAttribute('data-search');
        if (searchInput.value === '' || searchData.includes(val)) {
          opt.style.display = 'block';
          hasMatch = true;
        } else {
          opt.style.display = 'none';
        }
      });

      if (hasMatch) {
        noPatientFound.style.display = 'none';
      } else {
        noPatientFound.style.display = 'block';
      }
    }

    // Select option
    patientOpts.forEach(opt => {
      opt.addEventListener('click', function() {
        const name = opt.getAttribute('data-name');
        const id = opt.getAttribute('data-id');
        const info = opt.getAttribute('data-info');

        searchInput.value = info;
        patientIdInput.value = id;
        dropdownMenu.style.display = 'none';
      });
    });

    // Close dropdown when clicking outside
    document.addEventListener('click', function(e) {
      if (!searchInput.contains(e.target) && !dropdownMenu.contains(e.target)) {
        dropdownMenu.style.display = 'none';
      }
    });
  }
});
</script>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
