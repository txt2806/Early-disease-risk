<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Bảng lịch điều phối khám')}"></head>
<style>
.schedule-grid-container {
  overflow-x: auto;
  background: #111827;
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 12px;
  margin-top: 20px;
}
.schedule-table {
  width: 100%;
  border-collapse: collapse;
  min-width: 800px;
}
.schedule-table th, .schedule-table td {
  border: 1px solid rgba(255,255,255,0.06);
  padding: 12px;
  vertical-align: top;
}
.schedule-table th {
  background: #1e293b;
  color: #e8edf5;
  font-weight: 700;
  text-align: center;
}
.time-col {
  width: 120px;
  background: #0f172a;
  color: #8a96b0;
  font-weight: 700;
  font-family: monospace;
  text-align: center;
  vertical-align: middle !important;
}
.appointment-card {
  background: #1e293b;
  border-left: 4px solid #3b82f6;
  border-radius: 6px;
  padding: 8px;
  margin-bottom: 6px;
  box-shadow: 0 4px 6px -1px rgba(0,0,0,0.2);
}
.appointment-card.status-Pending { border-left-color: #fbbf24; }
.appointment-card.status-Confirmed { border-left-color: #10b981; }
.appointment-card.status-CheckedIn { border-left-color: #8b5cf6; }
.appointment-card.status-InProgress { border-left-color: #ec4899; }
.appointment-card.status-Completed { border-left-color: #64748b; }
.appointment-card.status-Cancelled { border-left-color: #ef4444; opacity: 0.6; }

.card-pat-name { font-weight: 700; color: #e8edf5; font-size: 13px; }
.card-room { font-size: 11px; color: #10b981; font-weight: 700; margin-top: 2px; }
.card-status { font-size: 10px; color: #8a96b0; text-transform: uppercase; margin-top: 2px; font-weight: 600; }

/* Workload styles in table headers */
.doc-header-info {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
}
.doc-header-name {
  font-size: 14px;
  font-weight: 700;
  color: #e8edf5;
}
.doc-header-specialty {
  font-size: 11px;
  color: #8a96b0;
}
.doc-workload-container {
  margin-top: 8px;
  width: 100%;
  max-width: 140px;
  text-align: left;
}
.doc-workload-label {
  display: flex;
  justify-content: space-between;
  font-size: 10px;
  color: #8a96b0;
  margin-bottom: 4px;
}
.doc-workload-bar-bg {
  width: 100%;
  height: 6px;
  background: rgba(255, 255, 255, 0.1);
  border-radius: 3px;
  overflow: hidden;
}
.doc-workload-bar-fill {
  height: 100%;
  border-radius: 3px;
  transition: width 0.3s ease;
}
.fill-normal { background: #10b981; }
.fill-warning { background: #fbbf24; }
.fill-full { background: #ef4444; }

.work-badge-full {
  background: rgba(239, 68, 68, 0.15);
  color: #ef4444;
  border: 1px solid rgba(239, 68, 68, 0.3);
  border-radius: 4px;
  padding: 2px 6px;
  font-size: 10px;
  font-weight: bold;
  display: inline-block;
  margin-top: 6px;
}

.quick-edit-btn {
  background: none;
  border: none;
  color: #60a5fa;
  cursor: pointer;
  font-size: 11px;
  padding: 0;
  margin-top: 6px;
  font-weight: 600;
  display: block;
}
.quick-edit-btn:hover { text-decoration: underline; }
</style>
<body>
<div th:replace="~{fragments :: receptionSidebar('schedule')}"></div>

<main class="main">
  <header th:replace="~{fragments :: simpleTopbar('Bảng lịch điều phối khám')}"></header>
  <div class="content">

    <!-- Alerts -->
    <div class="alert-success" th:if="${success}" th:text="${success}" style="padding: 12px; margin-bottom: 20px; border-radius: 8px; background: rgba(16, 185, 129, 0.15); color: #34d399; border: 1px solid rgba(16, 185, 129, 0.3);"></div>
    <div class="alert-danger" th:if="${error}" th:text="${error}" style="padding: 12px; margin-bottom: 20px; border-radius: 8px; background: rgba(239, 68, 68, 0.15); color: #f87171; border: 1px solid rgba(239, 68, 68, 0.3);"></div>

    <!-- Filter toolbar -->
    <div class="card" style="padding: 16px;">
      <form th:action="@{/reception/schedule}" method="get" style="display:flex; gap:16px; align-items:center; flex-wrap:wrap;">
        <div style="display:flex; gap:10px; align-items:center;">
          <label style="color:#8a96b0; font-size:13px; font-weight:600;">Chọn Ngày phối lịch:</label>
          <input type="date" name="dateStr" th:value="${selectedDate}" 
                 style="background: #1a2440; border: 1px solid rgba(255,255,255,0.08); border-radius: 6px; padding: 8px 12px; color: #e8edf5; outline:none; cursor:pointer;">
          <button type="submit" style="background:#3b82f6; color:white; border:none; border-radius:6px; padding:8px 16px; font-size:13px; font-weight:600; cursor:pointer; transition:opacity 0.2s;"
                  onmouseover="this.style.opacity='0.85'" onmouseout="this.style.opacity='1'">📅 Xem lịch</button>
        </div>
        
        <div style="flex:1;"></div>
        
        <div style="color: #8a96b0; font-size: 12px; display:flex; gap:12px;">
          <span>📌 Chú thích màu:</span>
          <span style="color:#fbbf24;">● Chờ duyệt</span>
          <span style="color:#10b981;">● Đã duyệt</span>
          <span style="color:#8b5cf6;">● Bệnh nhân đến</span>
          <span style="color:#ec4899;">● Đang khám</span>
        </div>
      </form>
    </div>

    <!-- Timeline Grid Board -->
    <div class="schedule-grid-container">
      <table class="schedule-table">
        <thead>
          <tr>
            <th class="time-col" style="vertical-align: middle;">Khung giờ</th>
            <th th:each="doc : ${doctors}" style="min-width: 180px; padding: 12px 8px;">
              <div class="doc-header-info" 
                   th:with="count=${workloads.get(doc.doctorId)},
                            percent=${count * 100 / 8}">
                <div class="doc-header-name" th:text="${doc.fullName}">Bác sĩ</div>
                <div class="doc-header-specialty" th:text="${doc.specialty != null ? doc.specialty : 'Tim mạch'}">Chuyên khoa</div>
                
                <div class="doc-workload-container">
                  <div class="doc-workload-label">
                    <span>Tải lượng:</span>
                    <span th:text="${count} + '/8h'">0/8h</span>
                  </div>
                  <div class="doc-workload-bar-bg">
                    <div class="doc-workload-bar-fill" 
                         th:style="'width: ' + ${percent > 100 ? 100 : percent} + '%'"
                         th:classappend="${count >= 8} ? 'fill-full' : (${count >= 6} ? 'fill-warning' : 'fill-normal')"></div>
                  </div>
                </div>
                
                <div th:if="${count >= 8}" class="work-badge-full">
                  🛑 Hết chỗ
                </div>
              </div>
            </th>
          </tr>
        </thead>
        <tbody>
          <!-- Time slots -->
          <tr th:each="slot : ${#strings.arraySplit('08:00:00,09:00:00,10:00:00,11:00:00,13:30:00,14:30:00,15:30:00,16:30:00', ',')}">
            <td class="time-col" th:text="${#strings.substring(slot, 0, 5)}">08:00</td>
            
            <!-- Doctors columns -->
            <td th:each="doc : ${doctors}">
              <!-- Render appointments in this cell -->
              <div th:each="a : ${appointments}" 
                   th:if="${a.doctor != null && a.doctor.doctorId == doc.doctorId && #temporals.format(a.timeSlot, 'HH:mm') == #strings.substring(slot, 0, 5)}"
                   class="appointment-card" th:classappend="'status-' + ${a.status}">
                
                <div class="card-pat-name" th:text="${a.patient.fullName}">Patient Name</div>
                <div class="card-room" th:text="${a.roomNumber != null && !a.roomNumber.isEmpty() ? '🚪 ' + a.roomNumber : '🚪 Chưa xếp phòng'}">Room</div>
                
                <div class="card-status">
                  <span th:text="${a.status == 'Pending' ? 'Chờ duyệt' : (a.status == 'Confirmed' ? 'Đã duyệt' : (a.status == 'CheckedIn' ? 'Đã đến' : (a.status == 'InProgress' ? 'Đang khám' : (a.status == 'Completed' ? 'Hoàn thành' : 'Đã hủy'))))}">Pending</span>
                </div>
                
                <button class="quick-edit-btn" 
                        th:data-id="${a.appointmentId}"
                        th:data-patient-name="${a.patient.fullName}"
                        th:data-doctor-id="${a.doctor.doctorId}"
                        th:data-room-number="${a.roomNumber != null ? a.roomNumber : ''}"
                        th:data-date="${a.scheduledDate}"
                        th:data-time="${a.timeSlot}"
                        th:data-status="${a.status}"
                        onclick="openAssignModal(this)">
                  ⚙️ Phối phòng & Trạng thái
                </button>
              </div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>

  </div>
</main>

<!-- Modal Xếp lịch, phòng, bác sĩ (Reused form dashboard with redirectSource=schedule) -->
<div id="assignModal" class="modal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(10,15,30,0.85);backdrop-filter:blur(4px);align-items:center;justify-content:center;z-index:1000;">
  <div class="modal-content" style="background:#111827;border:1px solid rgba(255,255,255,0.1);border-radius:16px;padding:24px;max-width:500px;width:90%;box-shadow:0 20px 25px -5px rgba(0,0,0,0.5);color:#e8edf5;">
    <div style="display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid rgba(255,255,255,0.08);padding-bottom:12px;margin-bottom:16px;">
      <h3 style="font-size:16px;font-weight:700;color:#e8edf5;"><i class="ti ti-calendar-configs" style="color:#f59e0b;"></i> Cập nhật phân phối ca khám</h3>
      <span onclick="closeAssignModal()" style="font-size:24px;cursor:pointer;color:#8a96b0;line-height:1;">&times;</span>
    </div>

    <form th:action="@{/reception/appointments/assign}" method="post">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
      <input type="hidden" name="appointmentId" id="modalAppointmentId">
      <input type="hidden" name="redirectSource" value="schedule">
      <input type="hidden" name="redirectDate" id="modalRedirectDate">
      <input type="hidden" name="scheduledDate" id="modalDate">

      <div style="margin-bottom: 14px;">
        <label style="color:#8a96b0; font-size:11px; text-transform:uppercase;">Bệnh nhân</label>
        <div id="modalPatientName" style="font-size:15px; font-weight:700; color:#cbd5e1; margin-top:4px;">--</div>
      </div>

      <!-- Phân bác sĩ -->
      <div class="form-group" style="margin-bottom: 14px;">
        <label>Bác sĩ điều phối</label>
        <select name="doctorId" id="modalDoctorId" required
                style="width: 100%; background: #1a2440; border: 1px solid rgba(255,255,255,0.08); border-radius: 8px; padding: 10px; color: #e8edf5; font-size: 14px; outline: none;">
          <option th:each="doc : ${doctors}" th:value="${doc.doctorId}" th:text="${doc.fullName + ' - Tim mạch'}"></option>
        </select>
      </div>

      <!-- Xếp phòng khám -->
      <div class="form-group" style="margin-bottom: 14px;">
        <label>Xếp vào phòng khám</label>
        <input type="text" name="roomNumber" id="modalRoomNumber" placeholder="Ví dụ: Phòng 101, Phòng 102..." 
               style="width: 100%; background: #1a2440; border: 1px solid rgba(255,255,255,0.08); border-radius: 8px; padding: 10px; color: #e8edf5; font-size: 14px; outline: none;">
      </div>

      <!-- Đổi giờ khám -->
      <div class="form-group" style="margin-bottom: 14px;">
        <label>Khung giờ khám</label>
        <select name="timeSlot" id="modalTime" required 
                style="width: 100%; background: #1a2440; border: 1px solid rgba(255,255,255,0.08); border-radius: 8px; padding: 10px; color: #e8edf5; font-size: 14px; outline: none;">
          <option value="08:00:00">08:00 - 09:00</option>
          <option value="09:00:00">09:00 - 10:00</option>
          <option value="10:00:00">10:00 - 11:00</option>
          <option value="11:00:00">11:00 - 12:00</option>
          <option value="13:30:00">13:30 - 14:30</option>
          <option value="14:30:00">14:30 - 15:30</option>
          <option value="15:30:00">15:30 - 16:30</option>
          <option value="16:30:00">16:30 - 17:30</option>
        </select>
      </div>

      <!-- Trạng thái khám -->
      <div class="form-group" style="margin-bottom: 20px;">
        <label>Trạng thái</label>
        <select name="status" id="modalStatus" required 
                style="width: 100%; background: #1a2440; border: 1px solid rgba(255,255,255,0.08); border-radius: 8px; padding: 10px; color: #e8edf5; font-size: 14px; outline: none;">
          <option value="Pending">Chờ duyệt (Pending)</option>
          <option value="Confirmed">Đã duyệt & xếp lịch (Confirmed)</option>
          <option value="CheckedIn">Bệnh nhân đã đến (CheckedIn)</option>
          <option value="InProgress">Đang khám (InProgress)</option>
          <option value="Completed">Đã khám xong (Completed)</option>
          <option value="Cancelled">Đã hủy lịch (Cancelled)</option>
        </select>
      </div>

      <div style="display:flex; justify-content:flex-end; gap:10px; border-top:1px solid rgba(255,255,255,0.08); padding-top:16px;">
        <button type="button" onclick="closeAssignModal()" class="btn btn-ghost" style="padding: 8px 16px; margin:0;">Hủy</button>
        <button type="submit" class="btn" style="background:#3b82f6; color:white; padding: 8px 20px; border:none; border-radius:8px; margin:0;">Lưu cập nhật</button>
      </div>
    </form>
  </div>
</div>

<script>
function openAssignModal(btn) {
  const id = btn.getAttribute("data-id");
  const name = btn.getAttribute("data-patient-name");
  const doctorId = btn.getAttribute("data-doctor-id");
  const room = btn.getAttribute("data-room-number");
  const date = btn.getAttribute("data-date");
  const time = btn.getAttribute("data-time");
  const status = btn.getAttribute("data-status");

  document.getElementById("modalAppointmentId").value = id;
  document.getElementById("modalPatientName").textContent = name;
  document.getElementById("modalDoctorId").value = doctorId;
  document.getElementById("modalRoomNumber").value = room;
  document.getElementById("modalDate").value = date;
  document.getElementById("modalRedirectDate").value = document.querySelector('input[name="dateStr"]').value;
  
  let normalizedTime = time;
  if (time && time.length === 5) {
    normalizedTime = time + ":00";
  }
  document.getElementById("modalTime").value = normalizedTime;
  document.getElementById("modalStatus").value = status;

  document.getElementById("assignModal").style.display = "flex";
}

function closeAssignModal() {
  document.getElementById("assignModal").style.display = "none";
}
</script>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
