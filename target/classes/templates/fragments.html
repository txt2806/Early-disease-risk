<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:fragment="head(title)">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title th:text="${title} + ' — CardioCare'">CardioCare</title>
<link rel="stylesheet" th:href="@{/css/main.css}">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
</head>

<!-- SIDEBAR fragment -->
<aside th:fragment="sidebar(page)" class="sidebar">
  <div class="sidebar-logo">
    <div class="logo-mark">
      <div class="logo-icon">❤️</div>
      <div>
        <div class="logo-text">CardioCare</div>
        <div class="logo-sub">DOCTOR PORTAL</div>
      </div>
    </div>
  </div>

  <nav class="sidebar-nav">
    <div class="nav-label">Tổng quan</div>
    <a th:href="@{/doctor/dashboard}"
       th:classappend="${page == 'dashboard'} ? ' active'" class="nav-item">
      <i class="ti ti-layout-dashboard"></i> Dashboard
    </a>

    <div class="nav-label">Quản lý</div>
    <a th:href="@{/doctor/patients}"
       th:classappend="${page == 'patients'} ? ' active'" class="nav-item">
      <i class="ti ti-users"></i> Bệnh nhân
    </a>
    <a th:href="@{/doctor/alerts}"
       th:classappend="${page == 'alerts'} ? ' active'" class="nav-item">
      <i class="ti ti-bell-ringing"></i> Cảnh báo
      <span class="nav-badge" th:text="${highAlertCount}" th:if="${highAlertCount > 0}">0</span>
    </a>

    <div class="nav-label">Công cụ</div>
    <a th:href="@{/doctor/ai-predict}"
       th:classappend="${page == 'ai-predict'} ? ' active'" class="nav-item">
      <i class="ti ti-brain"></i> Dự đoán AI
    </a>
  </nav>

  <div class="sidebar-footer">
    <div class="doctor-info">
      <div class="doctor-avatar" th:text="${doctor.fullName.charAt(0)}">B</div>
      <div>
        <div class="doctor-name" th:text="${doctor.fullName}">Bác sĩ</div>
        <div class="doctor-role" th:text="${doctor.specialty}">Tim mạch</div>
      </div>
    </div>
    <a th:href="@{/logout}" class="nav-item" style="margin-top:8px;color:#e05a5a;">
      <i class="ti ti-logout"></i> Đăng xuất
    </a>
  </div>
</aside>

<!-- TOPBAR fragment -->
<header th:fragment="topbar(title)" class="topbar">
  <div class="topbar-title" th:text="${title}">Dashboard</div>
  <form th:action="@{/doctor/patients}" method="get" class="topbar-search">
    <i class="ti ti-search"></i>
    <input type="text" name="search" placeholder="Tìm bệnh nhân...">
  </form>
  <a th:href="@{/doctor/alerts}" class="topbar-btn">
    <i class="ti ti-bell"></i>
    <div class="notif-dot" th:if="${highAlertCount > 0}"></div>
  </a>
</header>
</html>
