# ── SERVER ──────────────────────────────────────────
server.port=8080

spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.hibernate.naming.implicit-strategy=org.hibernate.boot.model.naming.ImplicitNamingStrategyLegacyHbmImpl

# ── DEFAULT DATABASE: SQL SERVER ───────────────────
spring.datasource.url=jdbc:sqlserver://${DB_HOST:localhost}:${DB_PORT:1433};databaseName=${DB_NAME:Cardiology_Management_DB};encrypt=true;trustServerCertificate=true;
spring.datasource.username=${DB_USER:sa}
spring.datasource.password=${DB_PASSWORD:123456}
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect

# ── JPA COMMON ────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.format_sql=true

# ── THYMELEAF ────────────────────────────────────────
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8

# ── AI API ───────────────────────────────────────────
ai.api.url=${AI_API_URL:http://10.33.81.208:8000/predict}

# ── SESSION ──────────────────────────────────────────
server.servlet.session.timeout=30m

# ── ENCODING ─────────────────────────────────────────
spring.mandatory-file-encoding=UTF-8
spring.datasource.hikari.initialization-fail-timeout=-1
spring.datasource.hikari.connection-timeout=1500
