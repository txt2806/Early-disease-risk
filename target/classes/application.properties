# ── SERVER ──────────────────────────────────────────
server.port=8080

# ── H2 IN-MEMORY DATABASE (BỎ QUA KẾT NỐI DATABASE) ────────────────
# spring.datasource.url=jdbc:h2:mem:cardio_db;DB_CLOSE_DELAY=-1;MODE=MSSQLServer
# spring.datasource.username=sa
# spring.datasource.password=
# spring.datasource.driver-class-name=org.h2.Driver
# spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
# spring.jpa.hibernate.ddl-auto=update
# spring.jpa.show-sql=true
# spring.h2.console.enabled=true
# spring.h2.console.path=/h2-console
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.hibernate.naming.implicit-strategy=org.hibernate.boot.model.naming.ImplicitNamingStrategyLegacyHbmImpl

# ── SQL SERVER ───────────────────────────────────
spring.datasource.url=jdbc:sqlserver://${DB_HOST:localhost}:${DB_PORT:1433};databaseName=${DB_NAME:Cardiology_Management_DB};encrypt=true;trustServerCertificate=true
spring.datasource.username=${DB_USER:sa}
spring.datasource.password=${DB_PASSWORD:123456}
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect
spring.jpa.properties.hibernate.format_sql=true

# ── THYMELEAF ────────────────────────────────────────
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8

# ── AI API ───────────────────────────────────────────
# Đổi IP thành IP máy chạy FastAPI (Mặc định dùng IP hiện tại của bạn, dễ dàng override qua biến môi trường AI_API_URL)
ai.api.url=${AI_API_URL:http://10.33.81.208:8000/predict}

# ── SESSION ──────────────────────────────────────────
server.servlet.session.timeout=30m

# ── ENCODING ─────────────────────────────────────────
spring.mandatory-file-encoding=UTF-8
spring.datasource.hikari.initialization-fail-timeout=-1
spring.datasource.hikari.connection-timeout=1500
